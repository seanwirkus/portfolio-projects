<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Base Memorizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-mark">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 2C10 2 6 6 6 10C6 14 10 18 10 18C10 18 14 14 14 10C14 6 10 2 10 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <circle cx="10" cy="7" r="1.5" fill="var(--accent-1)"/>
                        <circle cx="10" cy="13" r="1.5" fill="var(--accent-2)"/>
                        <line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2"/>
                    </svg>
                </div>
                <h1>DNA Base Memorizer</h1>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
                    <svg class="theme-icon sun" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <svg class="theme-icon moon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M13.5 8.5a5.5 5.5 0 0 1-6-6 5.5 5.5 0 1 0 6 6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="explore">Explore</button>
                    <button class="mode-tab" data-mode="quiz-name">Quiz: Names</button>
                    <button class="mode-tab" data-mode="quiz-hbond">Quiz: H-Bonds</button>
                    <button class="mode-tab" data-mode="quiz-pair">Quiz: Pairing</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Explore Mode -->
            <div class="explore-panel" id="explore-panel">
                <div class="base-selector">
                    <button class="base-btn active" data-base="adenine">
                        <span class="base-letter">A</span>
                        <span class="base-name">Adenine</span>
                        <span class="base-type purine-tag">Purine</span>
                    </button>
                    <button class="base-btn" data-base="thymine">
                        <span class="base-letter">T</span>
                        <span class="base-name">Thymine</span>
                        <span class="base-type pyrimidine-tag">Pyrimidine</span>
                    </button>
                    <button class="base-btn" data-base="guanine">
                        <span class="base-letter">G</span>
                        <span class="base-name">Guanine</span>
                        <span class="base-type purine-tag">Purine</span>
                    </button>
                    <button class="base-btn" data-base="cytosine">
                        <span class="base-letter">C</span>
                        <span class="base-name">Cytosine</span>
                        <span class="base-type pyrimidine-tag">Pyrimidine</span>
                    </button>
                    <button class="base-btn" data-base="uracil">
                        <span class="base-letter">U</span>
                        <span class="base-name">Uracil</span>
                        <span class="base-type pyrimidine-tag" style="background:var(--accent-2);color:var(--bg)">RNA Pyrim.</span>
                    </button>
                </div>

                <div class="canvas-area">
                    <canvas id="mol-canvas"></canvas>
                    <div class="canvas-controls">
                        <label class="toggle-label">
                            <input type="checkbox" id="show-hbond" checked>
                            <span class="toggle-switch"></span>
                            H-Bond Sites
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="show-numbering" checked>
                            <span class="toggle-switch"></span>
                            Atom Numbering
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="show-lone-pairs">
                            <span class="toggle-switch"></span>
                            Lone Pairs
                        </label>
                        <label class="toggle-label">
                            <input type="checkbox" id="show-sugar-bond">
                            <span class="toggle-switch"></span>
                            Sugar Bond (C1')
                        </label>
                        <div class="rotate-control">
                            <label class="rotate-label">Rotate</label>
                            <button class="rotate-step" id="rotate-left" title="Rotate left 90 degrees" aria-label="Rotate left 90 degrees">&#8630;</button>
                            <span class="rotate-value" id="rotate-value">0°</span>
                            <button class="rotate-step" id="rotate-right" title="Rotate right 90 degrees" aria-label="Rotate right 90 degrees">&#8631;</button>
                            <button class="rotate-reset" id="rotate-reset" title="Reset rotation">&#8634;</button>
                        </div>
                        <div class="pairing-control">
                            <button class="pairing-btn" id="pairing-demo-btn" type="button">Show Pairing</button>
                            <span class="pairing-status" id="pairing-demo-status">Single base view</span>
                        </div>
                    </div>
                </div>

                <div class="info-panel">
                    <div class="info-card" id="base-info">
                        <h3 id="info-title">Adenine</h3>
                        <div class="info-formula" id="info-formula">C₅H₅N₅</div>
                        <div class="info-detail" id="info-type">Purine (bicyclic)</div>
                        <div class="info-detail" id="info-pairs">Pairs with: <strong>Thymine</strong> (2 H-bonds)</div>
                    </div>
                    <div class="legend-card">
                        <h4>Legend</h4>
                        <div class="legend-item">
                            <span class="legend-dot donor"></span> H-Bond Donor (—NH or —NH₂)
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot acceptor"></span> H-Bond Acceptor (C=O or :N)
                        </div>
                        <div class="legend-item">
                            <span class="legend-swatch" style="color: var(--nitrogen)">N</span> Nitrogen
                        </div>
                        <div class="legend-item">
                            <span class="legend-swatch" style="color: var(--oxygen)">O</span> Oxygen
                        </div>
                        <div class="legend-item">
                            <span class="legend-swatch" style="color: var(--carbon)">C</span> Carbon
                        </div>
                    </div>
                    <div class="hbond-list" id="hbond-list"></div>
                </div>
            </div>

            <!-- Quiz Mode -->
            <div class="quiz-panel hidden" id="quiz-panel">
                <div class="quiz-header">
                    <div class="quiz-score">
                        <span class="score-label">Score</span>
                        <span class="score-value" id="score-value">0 / 0</span>
                    </div>
                    <div class="quiz-streak">
                        <span class="streak-label">Streak</span>
                        <span class="streak-value" id="streak-value">0</span>
                    </div>
                    <button class="reset-btn" id="reset-quiz">Reset</button>
                </div>
                <div class="quiz-canvas-area">
                    <canvas id="quiz-canvas"></canvas>
                </div>
                <div class="quiz-prompt" id="quiz-prompt">What is this base?</div>
                <div class="quiz-options" id="quiz-options"></div>
                <div class="quiz-feedback hidden" id="quiz-feedback"></div>
            </div>
        </div>
    </div>

    <script src="bases.js"></script>
    <script src="renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
