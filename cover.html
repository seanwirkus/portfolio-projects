<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=630">
    <title>Sean | Portfolio Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #070708;
            color: #fafafa;
            position: relative;
        }

        /* Background gradients */
        .bg-g1 {
            position: absolute;
            top: -80px;
            left: -120px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 60%);
            filter: blur(80px);
            pointer-events: none;
        }
        .bg-g2 {
            position: absolute;
            bottom: -100px;
            right: -80px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 60%);
            filter: blur(80px);
            pointer-events: none;
        }
        .bg-g3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(16,185,129,0.08), transparent 60%);
            filter: blur(60px);
            pointer-events: none;
        }

        .bg-noise {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Grid of mini project cards in background */
        .card-grid {
            position: absolute;
            top: 50%;
            right: 60px;
            transform: translateY(-50%);
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            opacity: 0.5;
        }

        .mini-card {
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .mc-piano { background: radial-gradient(circle at top, #4338ca, #1e1b4b); }
        .mc-carplay { background: radial-gradient(ellipse at 50% 120%, #1e293b, #0f172a); }
        .mc-ekg { background: linear-gradient(135deg, rgba(30,10,20,0.9), rgba(10,5,10,0.95)); }
        .mc-freeway { background: #0a0a0a; }
        .mc-orbital { background: radial-gradient(circle, #064e3b, #022c22); }
        .mc-supa { background: radial-gradient(ellipse at 30% 80%, #312e81, #1e1b4b); }
        .mc-rad { background: radial-gradient(ellipse at 40% 60%, #1e3a5f, #0c1929); }
        .mc-esp { background: radial-gradient(circle at 50% 80%, #1a1a2e, #0a0a15); }
        .mc-notch { background: radial-gradient(ellipse at 50% 30%, #1c1c1e, #0a0a0a); }

        .mc-icon {
            font-size: 1.8rem;
            opacity: 0.7;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 2;
            padding: 80px 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 720px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.25);
            color: #60a5fa;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: fit-content;
            margin-bottom: 24px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
        }

        h1 {
            font-size: 3.4rem;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        h1 span {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            color: #a1a1aa;
            line-height: 1.6;
            max-width: 540px;
            margin-bottom: 28px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #d4d4d8;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        /* Decorative line */
        .accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6, #10b981);
        }

        .logo {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #fafafa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .site-url {
            position: absolute;
            bottom: 44px;
            right: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #71717a;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="bg-g1"></div>
    <div class="bg-g2"></div>
    <div class="bg-g3"></div>
    <div class="bg-noise"></div>

    <div class="card-grid">
        <div class="mini-card mc-piano"><span class="mc-icon">&#9835;</span></div>
        <div class="mini-card mc-carplay"><span class="mc-icon">&#9211;</span></div>
        <div class="mini-card mc-ekg"><span class="mc-icon">&#9829;</span></div>
        <div class="mini-card mc-freeway"><span class="mc-icon">&#9951;</span></div>
        <div class="mini-card mc-orbital"><span class="mc-icon">&#9883;</span></div>
        <div class="mini-card mc-supa"><span class="mc-icon">&#9881;</span></div>
        <div class="mini-card mc-rad"><span class="mc-icon">&#10010;</span></div>
        <div class="mini-card mc-esp"><span class="mc-icon">&#9881;</span></div>
        <div class="mini-card mc-notch"><span class="mc-icon">&#9654;</span></div>
    </div>

    <div class="content">
        <div class="badge"><div class="badge-dot"></div> Software Engineer & Biomedical Developer</div>
        <h1>Engineering at the<br>Intersection of <span>Health & Tech</span></h1>
        <p class="subtitle">UC San Diego &middot; Full Stack &middot; Embedded Systems &middot; Healthcare Software</p>
        <div class="tags">
            <span class="tag">React</span>
            <span class="tag">Swift</span>
            <span class="tag">C/C++</span>
            <span class="tag">ESP32</span>
            <span class="tag">Python</span>
            <span class="tag">Lua</span>
            <span class="tag">UI/UX</span>
        </div>
    </div>

    <div class="logo">S.</div>
    <div class="site-url">sean.dev</div>
    <div class="accent-line"></div>
</body>
</html>
