<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, height=630">
    <title>Sean | Portfolio Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #070708;
            color: #fafafa;
            position: relative;
        }

        /* Background gradients */
        .bg-g1 {
            position: absolute;
            top: -80px;
            left: -120px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 60%);
            filter: blur(80px);
            pointer-events: none;
        }
        .bg-g2 {
            position: absolute;
            bottom: -100px;
            right: -80px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 60%);
            filter: blur(80px);
            pointer-events: none;
        }
        .bg-g3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(16,185,129,0.08), transparent 60%);
            filter: blur(60px);
            pointer-events: none;
        }

        .bg-noise {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Grid of mini project cards in background */
        .card-grid {
            position: absolute;
            top: 50%;
            right: 60px;
            transform: translateY(-50%);
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            opacity: 0.5;
        }

        .mini-card {
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .mc-piano { background: radial-gradient(circle at top, #4338ca, #1e1b4b); }
        .mc-carplay { background: radial-gradient(ellipse at 50% 120%, #1e293b, #0f172a); }
        .mc-ekg { background: linear-gradient(135deg, rgba(30,10,20,0.9), rgba(10,5,10,0.95)); }
        .mc-freeway { background: #0a0a0a; }
        .mc-orbital { background: radial-gradient(circle, #064e3b, #022c22); }
        .mc-supa { background: radial-gradient(ellipse at 30% 80%, #312e81, #1e1b4b); }
        .mc-rad { background: radial-gradient(ellipse at 40% 60%, #1e3a5f, #0c1929); }
        .mc-esp { background: radial-gradient(circle at 50% 80%, #1a1a2e, #0a0a15); }
        .mc-notch { background: radial-gradient(ellipse at 50% 30%, #1c1c1e, #0a0a0a); }
        .mc-pool { background: radial-gradient(circle at 50% 35%, #102a22, #04090f 78%); }

        .mc-icon {
            font-size: 1.8rem;
            opacity: 0.7;
        }

        .mini-pool {
            position: relative;
            width: 90px;
            height: 56px;
            border-radius: 12px;
            border: 7px solid #5a3418;
            background: radial-gradient(circle at 50% 40%, #0f8f64, #06503d 75%);
            box-shadow: inset 0 0 16px rgba(0,0,0,0.35);
            overflow: hidden;
            transform: rotate(-4deg);
        }

        .mini-pool::before {
            content: '';
            position: absolute;
            inset: 7px;
            border-radius: 8px;
            border: 2px solid rgba(7, 55, 42, 0.85);
        }

        .mini-pocket {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #020617;
            box-shadow: 0 0 0 2px rgba(35, 17, 6, 0.9);
        }

        .mini-pocket.tl { top: 2px; left: 2px; }
        .mini-pocket.tm { top: 1px; left: 50%; transform: translateX(-50%); }
        .mini-pocket.tr { top: 2px; right: 2px; }
        .mini-pocket.bl { bottom: 2px; left: 2px; }
        .mini-pocket.bm { bottom: 1px; left: 50%; transform: translateX(-50%); }
        .mini-pocket.br { bottom: 2px; right: 2px; }

        .mini-cue {
            position: absolute;
            width: 48px;
            height: 5px;
            left: -2px;
            top: 34px;
            border-radius: 999px;
            background: linear-gradient(90deg, #e0f2fe 0%, #fcd34d 12%, #c08457 55%, #2f1606 100%);
            transform-origin: 85% 50%;
            animation: coverCue 5.8s cubic-bezier(0.3, 0, 0.2, 1) infinite;
        }

        .mini-aim {
            position: absolute;
            left: 18px;
            top: 32px;
            width: 30px;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0));
            transform: rotate(-12deg);
            animation: coverAim 5.8s ease-in-out infinite;
        }

        .mini-ball {
            position: absolute;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            box-shadow: inset -3px -3px 4px rgba(0,0,0,0.35), inset 3px 3px 4px rgba(255,255,255,0.18);
        }

        .mini-ball::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
        }

        .mini-ball.cue {
            left: 18px;
            top: 33px;
            background: radial-gradient(circle at 35% 35%, #ffffff, #cbd5e1 80%);
            animation: coverCueBall 5.8s ease-in-out infinite;
        }

        .mini-ball.one {
            left: 55px;
            top: 18px;
            background: radial-gradient(circle at 35% 35%, #fde68a, #f59e0b 80%);
            animation: coverObjOne 5.8s ease-in-out infinite;
        }

        .mini-ball.two {
            left: 62px;
            top: 25px;
            background: radial-gradient(circle at 35% 35%, #93c5fd, #2563eb 80%);
            animation: coverObjTwo 5.8s ease-in-out infinite;
        }

        .mini-ball.three {
            left: 69px;
            top: 21px;
            background: radial-gradient(circle at 35% 35%, #fca5a5, #ef4444 80%);
            animation: coverObjThree 5.8s ease-in-out infinite;
        }

        @keyframes coverCue {
            0%, 18%, 100% { transform: translate3d(0,0,0) rotate(-10deg); }
            30% { transform: translate3d(16px,-4px,0) rotate(-10deg); }
            42% { transform: translate3d(6px,-1px,0) rotate(-10deg); }
        }

        @keyframes coverAim {
            0%, 20%, 100% { opacity: 0.9; }
            32%, 62% { opacity: 0; }
        }

        @keyframes coverCueBall {
            0%, 20%, 100% { transform: translate3d(0,0,0); }
            32%, 62% { transform: translate3d(30px,-10px,0); }
        }

        @keyframes coverObjOne {
            0%, 22%, 100% { transform: translate3d(0,0,0); }
            34%, 62% { transform: translate3d(16px,-10px,0); }
        }

        @keyframes coverObjTwo {
            0%, 22%, 100% { transform: translate3d(0,0,0); }
            34%, 62% { transform: translate3d(12px,11px,0); }
        }

        @keyframes coverObjThree {
            0%, 22%, 100% { transform: translate3d(0,0,0); }
            34%, 62% { transform: translate3d(16px,-2px,0); }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 2;
            padding: 80px 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 720px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.25);
            color: #60a5fa;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: fit-content;
            margin-bottom: 24px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
        }

        h1 {
            font-size: 3.4rem;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        h1 span {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            color: #a1a1aa;
            line-height: 1.6;
            max-width: 540px;
            margin-bottom: 28px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #d4d4d8;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        /* Decorative line */
        .accent-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6, #10b981);
        }

        .logo {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #fafafa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .site-url {
            position: absolute;
            bottom: 44px;
            right: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #71717a;
            font-weight: 500;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="bg-g1"></div>
    <div class="bg-g2"></div>
    <div class="bg-g3"></div>
    <div class="bg-noise"></div>

    <div class="card-grid">
        <div class="mini-card mc-piano"><span class="mc-icon">&#9835;</span></div>
        <div class="mini-card mc-carplay"><span class="mc-icon">&#9211;</span></div>
        <div class="mini-card mc-ekg"><span class="mc-icon">&#9829;</span></div>
        <div class="mini-card mc-freeway"><span class="mc-icon">&#9951;</span></div>
        <div class="mini-card mc-orbital"><span class="mc-icon">&#9883;</span></div>
        <div class="mini-card mc-supa"><span class="mc-icon">&#9881;</span></div>
        <div class="mini-card mc-rad"><span class="mc-icon">&#10010;</span></div>
        <div class="mini-card mc-esp"><span class="mc-icon">&#9881;</span></div>
        <div class="mini-card mc-pool">
            <div class="mini-pool">
                <div class="mini-pocket tl"></div>
                <div class="mini-pocket tm"></div>
                <div class="mini-pocket tr"></div>
                <div class="mini-pocket bl"></div>
                <div class="mini-pocket bm"></div>
                <div class="mini-pocket br"></div>
                <div class="mini-aim"></div>
                <div class="mini-cue"></div>
                <div class="mini-ball cue"></div>
                <div class="mini-ball one"></div>
                <div class="mini-ball two"></div>
                <div class="mini-ball three"></div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="badge"><div class="badge-dot"></div> Software Engineer & Biomedical Developer</div>
        <h1>Engineering at the<br>Intersection of <span>Health & Tech</span></h1>
        <p class="subtitle">UC San Diego &middot; Full Stack &middot; Embedded Systems &middot; Healthcare Software</p>
        <div class="tags">
            <span class="tag">React</span>
            <span class="tag">Swift</span>
            <span class="tag">C/C++</span>
            <span class="tag">ESP32</span>
            <span class="tag">Python</span>
            <span class="tag">Lua</span>
            <span class="tag">UI/UX</span>
        </div>
    </div>

    <div class="logo">S.</div>
    <div class="site-url">sean.dev</div>
    <div class="accent-line"></div>
</body>
</html>
