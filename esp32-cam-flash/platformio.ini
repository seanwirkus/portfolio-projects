; ESP32-CAM (AI-Thinker): MJPEG + GPIO4 flash
;
; Wi-Fi (browser):    pio run -e esp32cam -t upload
; USB serial (no Wi-Fi): pio run -e esp32cam-serial -t upload
;   Monitor must match baud (921600 for serial build).

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=0

[env:esp32cam-serial]
extends = env:esp32cam
monitor_speed = 921600
build_flags =
  ${env:esp32cam.build_flags}
  -DTRANSPORT_SERIAL=1
