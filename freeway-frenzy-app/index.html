<script>
  // Theme Sync Logic
  const syncTheme = (mode) => {
    document.body.classList.toggle('light-mode', mode === 'light');
    document.documentElement.style.colorScheme = mode;
    
    // Update game colors based on theme if playing
    if (mode === 'light') {
        COL_GRASS = '#ecfdf5';
        COL_ROAD = '#e2e8f0';
        COL_SHOULDER = '#cbd5e1';
        COL_EDGE = '#94a3b8';
        COL_LANE_MARK = '#cbd5e1';
    } else {
        COL_GRASS = '#0A0A0A';
        COL_ROAD = '#181818';
        COL_SHOULDER = '#222222';
        COL_EDGE = '#333333';
        COL_LANE_MARK = '#444444';
    }
  };

  window.addEventListener('message', (e) => {
    if (e.data.type === 'theme-change') {
      syncTheme(e.data.mode);
    }
  });

  // Initial check for parent theme if possible
  try {
    if (window.parent && window.parent.document.body.dataset.themeMode) {
      setTimeout(() => syncTheme(window.parent.document.body.dataset.themeMode), 10);
    }
  } catch (e) {}
</script>
<canvas id="game"></canvas>

<div id="touch-controls">

<script>
/*
 * Freeway Frenzy – Web Port
 * Physics ported 1:1 from controller/main/main.c (ESP32-C3)
 * Rendering ported 1:1 from main/game_ui.c (ESP32-S3)
 * Keyboard replaces analog joystick; Web Audio API replaces buzzer.
 */

// ─── Touch setup ────────────────────────────────────────────────────────────
const touchDOM = document.getElementById('touch-controls');
touchDOM.addEventListener('touchstart', e => {
  if(e.target.dataset.key) {
    keys[e.target.dataset.key] = true;
    e.target.classList.add('active');
    
    // Auto-advance colors on Mobile if tapping start button before game starts
    if(e.target.dataset.key === 'Space' && gs && gs.phase === PHASE_MENU) {
      selectedCarColor = (selectedCarColor + 1) % CAR_COLORS.length;
    }
  }
});
touchDOM.addEventListener('touchend', e => {
  if(e.target.dataset.key) {
    keys[e.target.dataset.key] = false;
    e.target.classList.remove('active');
  }
});

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const SCR_W  = 1024;
const SCR_H  = 600;
canvas.width  = SCR_W;
canvas.height = SCR_H;

// Scale canvas to fit window while preserving aspect ratio
function resizeCanvas() {
  const scaleX = window.innerWidth  / SCR_W;
  const scaleY = window.innerHeight / SCR_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.style.width  = (SCR_W * scale) + 'px';
  canvas.style.height = (SCR_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Phases ──────────────────────────────────────────────────────────────────
const PHASE_MENU       = 0;
const PHASE_PLAYING    = 1;
const PHASE_CRASH_ANIM = 2;
const PHASE_GAME_OVER  = 3;

// ─── Logic-space constants (C3 / physics space: 512×300) ─────────────────────
const L_W            = 512;
const L_H            = 300;
const NUM_LANES      = 5;
const L_LANE_W       = 50;
const L_ROAD_W       = NUM_LANES * L_LANE_W;           // 250
const L_SHOULDER_W   = 15;
const L_TOTAL_ROAD_W = L_ROAD_W + L_SHOULDER_W * 2;    // 280
const L_ROAD_LEFT    = (L_W - L_TOTAL_ROAD_W) / 2;     // 116
const L_ROAD_SURF_L  = L_ROAD_LEFT + L_SHOULDER_W;     // 131
const L_LANE_CX      = lane => L_ROAD_SURF_L + L_LANE_W / 2 + lane * L_LANE_W;
const L_CAR_W        = 28;
const L_CAR_H        = 45;
const L_CAR_Y        = L_H - L_CAR_H - 15;             // 240
const L_OBS_W        = 26;
const L_OBS_H        = 42;
const MAX_OBSTACLES  = 12;
const CRASH_ANIM_S   = 1.2;
const BOOST_CHARGE_S = 4.0;
const BOOST_RELEASE_S = 2.4;
const BOOST_EXP_K    = 2.35;
const BOOST_MIN_GAIN = 0.55;
const BOOST_EXTRA_GAIN = 1.75;
const BOOST_MAX_SPEED = 820.0;

// ─── Render-space constants (S3 display: 1024×600 = C3 × 2) ──────────────────
const C3_SCALE       = 2;
const LANE_W         = L_LANE_W       * C3_SCALE;   // 100
const SHOULDER_W     = L_SHOULDER_W   * C3_SCALE;   // 30
const ROAD_W         = L_ROAD_W       * C3_SCALE;   // 500
const TOTAL_ROAD_W   = L_TOTAL_ROAD_W * C3_SCALE;   // 560
const ROAD_LEFT      = L_ROAD_LEFT    * C3_SCALE;   // 232
const ROAD_SURF_L    = L_ROAD_SURF_L  * C3_SCALE;   // 262
const ROAD_SURF_R    = ROAD_SURF_L + ROAD_W;         // 762
const ROAD_RIGHT     = ROAD_LEFT + TOTAL_ROAD_W;     // 792
const LANE_CX        = lane => ROAD_SURF_L + LANE_W / 2 + lane * LANE_W;
const CAR_W          = L_CAR_W  * C3_SCALE;  // 56
const CAR_H          = L_CAR_H  * C3_SCALE;  // 90
const CAR_Y          = L_CAR_Y  * C3_SCALE;  // 480
const OBS_W          = L_OBS_W  * C3_SCALE;  // 52
const OBS_H          = L_OBS_H  * C3_SCALE;  // 84
const DASH_LEN       = 40;
const GAP_LEN        = 30;
const DASH_CYCLE     = DASH_LEN + GAP_LEN;   // 70
const MAX_DEBRIS     = 10;

// ─── Colors ──────────────────────────────────────────────────────────────────
let COL_GRASS     = '#0A0A0A';
let COL_ROAD      = '#181818';
let COL_SHOULDER  = '#222222';
let COL_EDGE      = '#333333';
let COL_LANE_MARK = '#444444';
const COL_CAR_WIND  = '#8ECAE6';
const COL_HEADLIGHT = '#FFFF99';
const COL_TAILLIGHT = '#FF0000';
const COL_SHADOW    = '#050505';

const CAR_COLORS = [
  { name: 'Crimson',    body: '#D90429', roof: '#A3031F' },
  { name: 'Ocean Blue', body: '#1E90FF', roof: '#1565C0' },
  { name: 'Lime',       body: '#32CD32', roof: '#228B22' },
  { name: 'Gold',       body: '#FFD700', roof: '#DAA520' },
  { name: 'Purple',     body: '#9B59B6', roof: '#7D3C98' },
  { name: 'Hot Pink',   body: '#FF69B4', roof: '#DB2777' },
  { name: 'Orange',     body: '#FF8C00', roof: '#CC7000' },
  { name: 'Silver',     body: '#C0C0C0', roof: '#909090' },
];

const OBS_COLORS = ['#1E90FF','#FFD700','#32CD32','#FF6347','#9370DB','#E0E0E0'];

// ─── Game state ───────────────────────────────────────────────────────────────
let gs = {};
let selectedCarColor = 0;

function makeObs() {
  return { active: false, y: 0, lane: 0, type: 0 };
}

function normalizedExpRamp(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  return (Math.exp(BOOST_EXP_K * t) - 1.0) / (Math.exp(BOOST_EXP_K) - 1.0);
}

function resetGame() {
  const prevHigh = (gs.high_score || 0);
  const prevPhase = gs.phase;
  gs = {
    phase:             prevPhase,
    car_x:             L_LANE_CX(2),
    target_lane:       2,
    speed:             0,
    base_speed:        75.0,
    road_scroll:       gs.road_scroll || 0,
    distance:          0,
    score:             0,
    high_score:        prevHigh,
    obs:               Array.from({length: MAX_OBSTACLES}, makeObs),
    last_spawn_dist:   0,
    crash_start_s:     0,
    crash_obs_lane:    -1,
    crash_obs_y:       0,
    crash_speed:       0,
    last_lane_change_s:0,
    boost_hold_s:      0,
  };
}

// ─── PRNG (xorshift, same as C3) ─────────────────────────────────────────────
let _rng = 12345;
function fastRand() {
  _rng ^= _rng << 13;
  _rng ^= _rng >> 17;
  _rng ^= _rng << 5;
  return _rng >>> 0;
}

// ─── Obstacle management ──────────────────────────────────────────────────────
function maxActiveObs()   { return Math.min(1 + Math.floor(gs.score / 15), 8); }
function countActiveObs() { return gs.obs.filter(o => o.active).length; }

function laneClear(lane, spawnY) {
  for (const o of gs.obs) {
    if (!o.active || o.lane !== lane) continue;
    if (Math.abs(o.y - spawnY) < 120) return false;
  }
  return true;
}

function spawnOne() {
  if (countActiveObs() >= maxActiveObs()) return;
  const lane   = fastRand() % NUM_LANES;
  const spawnY = -L_OBS_H - 10;
  if (!laneClear(lane, spawnY)) return;
  for (const o of gs.obs) {
    if (!o.active) {
      o.active = true;
      o.lane   = lane;
      o.y      = spawnY;
      o.type   = fastRand() % 6;
      break;
    }
  }
}

// ─── Physics (1:1 port of C3 update_physics) ─────────────────────────────────
let nowS = 0;

function updatePhysics(dt, steer, throttle) {
  if (gs.phase === PHASE_MENU) {
    gs.road_scroll += 40.0 * dt;
    if (gs.road_scroll > 100000) gs.road_scroll -= 100000;
    gs.speed = 0;
    gs.car_x = L_LANE_CX(2);
    return;
  }
  if (gs.phase === PHASE_GAME_OVER) return;

  if (gs.phase === PHASE_CRASH_ANIM) {
    gs.speed *= (1.0 - 3.0 * dt);
    if (gs.speed < 5) gs.speed = 0;
    gs.road_scroll += gs.speed * 2.5 * dt;
    if (gs.road_scroll > 100000) gs.road_scroll -= 100000;
    if (nowS - gs.crash_start_s >= CRASH_ANIM_S) {
      if (gs.score > gs.high_score) gs.high_score = gs.score;
      gs.phase = PHASE_GAME_OVER;
    }
    return;
  }

  // PHASE_PLAYING
  // Lane change with 150ms cooldown
  if (nowS - gs.last_lane_change_s > 0.15) {
    if (steer < -40 && gs.target_lane > 0) {
      gs.target_lane--;
      gs.last_lane_change_s = nowS;
    }
    if (steer > 40 && gs.target_lane < NUM_LANES - 1) {
      gs.target_lane++;
      gs.last_lane_change_s = nowS;
    }
  }

  // Smooth car position toward target lane
  const tx   = L_LANE_CX(gs.target_lane);
  const lerp = Math.min(12.0 * dt, 1.0);
  gs.car_x += (tx - gs.car_x) * lerp;

  // Speed
  gs.base_speed = Math.min(75.0 + gs.distance * 0.045, 250.0);
  const speed_mod = throttle * 0.01;
  const boosting  = speed_mod > 0.1;

  if (boosting) {
    gs.boost_hold_s = Math.min(gs.boost_hold_s + dt, BOOST_CHARGE_S);
  } else {
    gs.boost_hold_s = Math.max(gs.boost_hold_s - dt * BOOST_RELEASE_S, 0.0);
  }
  const boost_ramp = Math.min(gs.boost_hold_s / BOOST_CHARGE_S, 1.0);
  const boost_curve = normalizedExpRamp(boost_ramp);

  let target_speed;
  if (boosting) {
    const boost_strength = BOOST_MIN_GAIN + boost_curve * BOOST_EXTRA_GAIN;
    target_speed = Math.min(gs.base_speed * (1.0 + speed_mod * boost_strength), BOOST_MAX_SPEED);
  } else if (speed_mod < -0.1) {
    target_speed = Math.max(gs.base_speed * (1.0 + speed_mod * 0.75), 15.0);
  } else {
    target_speed = gs.base_speed;
  }
  const sp_lerp = speed_mod < -0.1 ? 5.0 : (boosting ? 3.2 + boost_curve * 2.4 : 3.0);
  gs.speed += (target_speed - gs.speed) * sp_lerp * dt;
  if (gs.speed < 0) gs.speed = 0;

  // Road scroll and distance
  gs.road_scroll += gs.speed * 2.5 * dt;
  if (gs.road_scroll > 100000) gs.road_scroll -= 100000;
  gs.distance += gs.speed * dt * 0.3;
  gs.score = Math.floor(gs.distance / 10);

  // Obstacle spawn
  gs.last_spawn_dist += gs.speed * 2.0 * dt;
  const spawn_gap = Math.max(140.0 - gs.score * 0.8, 70.0);
  if (gs.last_spawn_dist >= spawn_gap) {
    gs.last_spawn_dist -= spawn_gap;
    spawnOne();
  }

  // Scroll obstacles downward
  const obs_speed = gs.speed * 1.8 + 30.0;
  for (const o of gs.obs) {
    if (!o.active) continue;
    o.y += obs_speed * dt;
    if (o.y > L_H + 50) o.active = false;
  }

  // AABB collision detection
  const car_l = gs.car_x - L_CAR_W / 2;
  const car_r = gs.car_x + L_CAR_W / 2;
  const car_t = L_CAR_Y;
  const car_b = L_CAR_Y + L_CAR_H;

  for (const o of gs.obs) {
    if (!o.active) continue;
    const ox = L_LANE_CX(o.lane);
    const ol = ox - L_OBS_W / 2, or_ = ox + L_OBS_W / 2;
    const ot = o.y,               ob  = o.y + L_OBS_H;
    if (car_l < or_ && car_r > ol && car_t < ob && car_b > ot) {
      gs.phase          = PHASE_CRASH_ANIM;
      gs.crash_start_s  = nowS;
      gs.crash_speed    = gs.speed;
      gs.crash_obs_lane = o.lane;
      gs.crash_obs_y    = o.y;
      // Reset crash visual offsets
      crashPlayerDx = crashPlayerDy = crashObsDx = crashObsDy = 0;
      shakeX = shakeY = 0;
      spawnDebris(
        (gs.car_x * C3_SCALE + LANE_CX(o.lane)) / 2,
        (o.y * C3_SCALE + CAR_Y) / 2,
        gs.speed
      );
      stopMelody();
      return;
    }
  }
}

// ─── Crash visual state ───────────────────────────────────────────────────────
let crashPlayerDx = 0, crashPlayerDy = 0;
let crashObsDx = 0, crashObsDy = 0;
let shakeX = 0, shakeY = 0;
let debris = [];

function spawnDebris(cx, cy, speed) {
  const colors = ['#FF4400','#FFAA00','#FF0000','#CCCCCC','#888888','#FFFF44'];
  debris = [];
  for (let i = 0; i < MAX_DEBRIS; i++) {
    const angle = Math.random() * Math.PI * 2;
    const mag   = 60 + Math.random() * (speed * 1.2 + 40);
    debris.push({
      active: true,
      x: cx + (Math.random() * 30 - 15),
      y: cy + (Math.random() * 30 - 15),
      vx: Math.cos(angle) * mag,
      vy: Math.sin(angle) * mag,
      size: 2 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * 6)],
    });
  }
}

function updateDebris(dt) {
  for (const d of debris) {
    if (!d.active) continue;
    d.x    += d.vx * dt;
    d.y    += d.vy * dt;
    d.vy   += 200 * dt;
    d.vx   *= 0.97;
    d.size -= 2.5 * dt;
    if (d.size <= 0.5 || d.y > SCR_H + 20) d.active = false;
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
});
window.addEventListener('keyup',   e => { keys[e.code] = false; });

function getSteer() {
  if (gs.phase !== PHASE_PLAYING) return 0;
  if (keys['ArrowLeft']  || keys['KeyA']) return -100;
  if (keys['ArrowRight'] || keys['KeyD']) return  100;
  return 0;
}

function getThrottle() {
  if (gs.phase !== PHASE_PLAYING) return 0;
  if (keys['ArrowUp']   || keys['KeyW']) return  100;
  if (keys['ArrowDown'] || keys['KeyS']) return -100;
  return 0;
}

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function fillRect(x, y, w, h, color) {
  if (w <= 0 || h <= 0) return;
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function blendHex(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3), 16);
  const g1 = parseInt(hex1.slice(3,5), 16);
  const b1 = parseInt(hex1.slice(5,7), 16);
  const r2 = parseInt(hex2.slice(1,3), 16);
  const g2 = parseInt(hex2.slice(3,5), 16);
  const b2 = parseInt(hex2.slice(5,7), 16);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ─── Road rendering ───────────────────────────────────────────────────────────
function drawRoad(scrollOverride) {
  const scroll = scrollOverride !== undefined ? scrollOverride : gs.road_scroll * C3_SCALE;

  // Grass
  fillRect(0, 0, SCR_W, SCR_H, COL_GRASS);
  // Road surface
  fillRect(ROAD_LEFT, 0, TOTAL_ROAD_W, SCR_H, COL_ROAD);
  // Shoulders
  fillRect(ROAD_LEFT,  0, SHOULDER_W, SCR_H, COL_SHOULDER);
  fillRect(ROAD_SURF_R, 0, SHOULDER_W, SCR_H, COL_SHOULDER);
  // Road edges
  fillRect(ROAD_SURF_L - 4, 0, 3, SCR_H, COL_EDGE);
  fillRect(ROAD_SURF_R + 1, 0, 3, SCR_H, COL_EDGE);

  // Dashed lane markings
  ctx.fillStyle = COL_LANE_MARK;
  const scrollMod = ((Math.floor(scroll) % DASH_CYCLE) + DASH_CYCLE) % DASH_CYCLE;
  for (let ld = 1; ld < NUM_LANES; ld++) {
    const cx = ROAD_SURF_L + ld * LANE_W;
    for (let startY = scrollMod - DASH_CYCLE; startY < SCR_H + DASH_CYCLE; startY += DASH_CYCLE) {
      ctx.fillRect(cx - 2, Math.floor(startY), 4, DASH_LEN);
    }
  }
}

// ─── Car rendering (port of draw_car from game_ui.c) ─────────────────────────
function drawCar(cx, cy, w, h, bodyColor, roofColor, isPlayer) {
  const x0 = cx - w / 2;
  const ri  = Math.floor(w / 4);
  const ws_h = Math.floor(h / 6);

  fillRect(x0 + 2, cy + 2, w, h, COL_SHADOW);           // shadow
  fillRect(x0,     cy,     w, h, bodyColor);             // body
  fillRect(x0 + ri, cy + Math.floor(h / 4), w - ri * 2, Math.floor(h / 3), roofColor); // roof

  // Windshield — player faces up, obstacles face down
  if (isPlayer) {
    fillRect(x0 + ri + 1, cy + 4, w - ri * 2 - 2, ws_h, COL_CAR_WIND);
  } else {
    fillRect(x0 + ri + 1, cy + h - ws_h - 5, w - ri * 2 - 2, ws_h, COL_CAR_WIND);
  }

  // Taillights
  fillRect(x0 + 2,     cy + h - 4, 5, 3, COL_TAILLIGHT);
  fillRect(x0 + w - 7, cy + h - 4, 5, 3, COL_TAILLIGHT);

  // Headlights (player only, at top)
  if (isPlayer) {
    fillRect(x0 + 2,     cy + 1, 4, 2, COL_HEADLIGHT);
    fillRect(x0 + w - 6, cy + 1, 4, 2, COL_HEADLIGHT);
  }
}

function drawCarDamaged(cx, cy, w, h, bodyColor, progress, isPlayer) {
  const x0 = cx - w / 2;
  fillRect(x0 + 2, cy + 2, w, h, COL_SHADOW);

  const cv  = Math.floor(progress * 8);
  const ch  = Math.floor(progress * 3);
  const dw  = w + ch;
  const dh  = Math.max(h - cv, Math.floor(h / 2));
  const dx0 = cx - dw / 2;

  const dmg = blendHex(bodyColor, '#333333', progress * 0.47);
  fillRect(dx0, cy, dw, dh, dmg);

  const crush = Math.floor(progress * 12);
  if (crush > 2) {
    if (isPlayer) fillRect(dx0 + 2, cy,          dw - 4, crush, '#1A1A1A');
    else          fillRect(dx0 + 2, cy + dh - crush, dw - 4, crush, '#1A1A1A');
  }

  // Fire
  if (progress < 0.8 && Math.random() > 0.33) {
    const fires = ['#FF4400','#FFAA00','#FF0000'];
    const fw = 4 + Math.floor(Math.random() * 6);
    const fh = 3 + Math.floor(Math.random() * 5);
    const fx = cx - fw / 2 + Math.floor(Math.random() * 8) - 4;
    const fy = isPlayer ? cy - fh : cy + dh;
    fillRect(fx, fy, fw, fh, fires[Math.floor(Math.random() * 3)]);
  }
}

// ─── Scene rendering ──────────────────────────────────────────────────────────
function renderFrame() {
  ctx.save();

  if (gs.phase === PHASE_CRASH_ANIM) {
    ctx.translate(shakeX, shakeY);
  }

  drawRoad();

  // Obstacles
  for (const o of gs.obs) {
    if (!o.active) continue;
    const oy = o.y * C3_SCALE;
    if (oy + OBS_H < 0 || oy > SCR_H) continue;
    drawCar(LANE_CX(o.lane), oy, OBS_W, OBS_H, OBS_COLORS[o.type % 6], '#111111', false);
  }

  if (gs.phase === PHASE_CRASH_ANIM) {
    const elapsed = Math.min((nowS - gs.crash_start_s) / CRASH_ANIM_S, 1.0);

    // Skid marks
    const skidLen = Math.floor(elapsed * 60);
    const pcx     = Math.round(gs.car_x * C3_SCALE + crashPlayerDx);
    const pcy     = CAR_Y + Math.round(crashPlayerDy);
    fillRect(pcx - 8, pcy, 3, skidLen, '#222222');
    fillRect(pcx + 5, pcy, 3, skidLen, '#222222');

    drawCarDamaged(pcx, pcy, CAR_W, CAR_H, CAR_COLORS[selectedCarColor].body, elapsed, true);

    if (gs.crash_obs_lane >= 0 && gs.crash_obs_lane < NUM_LANES) {
      const ocx = LANE_CX(gs.crash_obs_lane) + Math.round(crashObsDx);
      const ocy = gs.crash_obs_y * C3_SCALE + Math.round(crashObsDy);
      drawCarDamaged(ocx, ocy, OBS_W, OBS_H, '#888888', elapsed, false);
    }

    // Debris particles
    for (const d of debris) {
      if (!d.active) continue;
      fillRect(d.x, d.y, Math.max(1, Math.floor(d.size)), Math.max(1, Math.floor(d.size)), d.color);
    }
  } else {
    // Player car (not drawn during game over)
    if (gs.phase !== PHASE_GAME_OVER) {
      drawCar(gs.car_x * C3_SCALE, CAR_Y, CAR_W, CAR_H,
              CAR_COLORS[selectedCarColor].body,
              CAR_COLORS[selectedCarColor].roof, true);
    }
  }

  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  if (gs.phase !== PHASE_PLAYING && gs.phase !== PHASE_CRASH_ANIM) return;

  ctx.textAlign = 'left';

  // Speed
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(`${Math.round(gs.speed)} km/h`, 12, 28);

  // Score / distance
  ctx.font = '15px monospace';
  ctx.fillStyle = '#DDDDDD';
  ctx.fillText(`Score: ${gs.score}   ${Math.round(gs.distance)} m`, 12, 52);

  // Gear state
  const throttle = getThrottle();
  ctx.font = 'bold 14px monospace';
  if (throttle > 30) {
    ctx.fillStyle = '#FF4444';
    ctx.fillText('BOOST', 12, 74);
  } else if (throttle < -30) {
    ctx.fillStyle = '#44AAFF';
    ctx.fillText('BRAKE', 12, 74);
  } else {
    ctx.fillStyle = '#88FF88';
    ctx.fillText('CRUISE', 12, 74);
  }

  // High score (top-right)
  ctx.fillStyle = '#888888';
  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`Best: ${gs.high_score}`, SCR_W - 12, 28);

  // Controls reminder (bottom-right, faint)
  ctx.fillStyle = '#333333';
  ctx.font = '12px monospace';
  ctx.fillText('← → steer  ↑ boost  ↓ brake', SCR_W - 12, SCR_H - 10);
}

// ─── Menu overlay ─────────────────────────────────────────────────────────────
function drawMenu() {
  const px = SCR_W / 2, py = SCR_H / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.70)';
  ctx.beginPath();
  ctx.roundRect(px - 240, py - 175, 480, 350, 12);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF3333';
  ctx.font = 'bold 46px monospace';
  ctx.fillText('FREEWAY FRENZY', px, py - 120);

  ctx.fillStyle = '#AAAAAA';
  ctx.font = '18px monospace';
  ctx.fillText('SPACE or ENTER to play', px, py - 78);

  ctx.fillStyle = '#555555';
  ctx.font = '13px monospace';
  ctx.fillText('← → steer   ↑ boost   ↓ brake', px, py - 50);

  // Color picker
  ctx.fillStyle = '#888888';
  ctx.font = '14px monospace';
  ctx.fillText('Car Color  ( A / D or ← / → )', px, py - 12);

  const sw = 64, sh = 32;
  ctx.fillStyle = CAR_COLORS[selectedCarColor].body;
  ctx.fillRect(px - sw/2, py + 8, sw, sh);
  ctx.strokeStyle = '#888888';
  ctx.lineWidth = 1;
  ctx.strokeRect(px - sw/2, py + 8, sw, sh);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '15px monospace';
  ctx.fillText(CAR_COLORS[selectedCarColor].name, px, py + 60);

  if (gs.high_score > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '15px monospace';
    ctx.fillText(`High Score: ${gs.high_score}`, px, py + 88);
  }

  // Arrow hints
  ctx.fillStyle = '#555555';
  ctx.font = '22px monospace';
  ctx.fillText('‹', px - 55, py + 30);
  ctx.fillText('›', px + 45, py + 30);
}

function drawGameOver() {
  const px = SCR_W / 2, py = SCR_H / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.beginPath();
  ctx.roundRect(px - 230, py - 155, 460, 310, 12);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF3333';
  ctx.font = 'bold 42px monospace';
  ctx.fillText('GAME OVER', px, py - 100);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '24px monospace';
  ctx.fillText(`Score: ${gs.score}`, px, py - 55);

  ctx.fillStyle = '#FFD700';
  ctx.font = '20px monospace';
  ctx.fillText(`Best: ${gs.high_score}`, px, py - 22);

  ctx.fillStyle = '#AAAAAA';
  ctx.font = '17px monospace';
  ctx.fillText(`Distance: ${Math.round(gs.distance)} m`, px, py + 12);

  ctx.fillStyle = '#88FF88';
  ctx.font = '18px monospace';
  ctx.fillText('SPACE / ENTER  →  retry', px, py + 58);

  ctx.fillStyle = '#8888FF';
  ctx.font = '16px monospace';
  ctx.fillText('M  →  menu', px, py + 88);
}

// ─── Web Audio melody (Tokyo Drift, ported from C3 buzzer) ───────────────────
// Full melody arrays from controller/main/main.c
const NOTE_REST=0,NOTE_C4=262,NOTE_D4=294,NOTE_E4=330,NOTE_F4=349,NOTE_G4=392,NOTE_A4=440,NOTE_AS4=466,NOTE_C5=523;

const MELODY_NOTES = [
  NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,
  NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_REST,NOTE_A4,
  NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,
  NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,
  NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,NOTE_AS4,
  NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_A4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,NOTE_G4,
  NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_A4,NOTE_G4,
  NOTE_C5,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_C5,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_A4,NOTE_G4,
  NOTE_C5,NOTE_C5,NOTE_AS4,NOTE_C5,NOTE_AS4,NOTE_A4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,
  NOTE_REST,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_E4,NOTE_D4,NOTE_C4,NOTE_D4,
  NOTE_REST,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_E4,NOTE_D4,NOTE_C4,NOTE_D4,
  NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_A4,NOTE_G4,
  NOTE_C5,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_C5,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_A4,NOTE_G4,
  NOTE_C5,NOTE_C5,NOTE_AS4,NOTE_C5,NOTE_AS4,NOTE_A4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,
  NOTE_REST,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_E4,NOTE_D4,NOTE_C4,NOTE_D4,
  NOTE_REST,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_E4,NOTE_D4,NOTE_C4,NOTE_D4,
];

const MELODY_DURS = [
  4,4,8,4,8,4,4,8,4,8,4,8,4,8,4,1,
  4,4,8,4,8,4,4,8,4,8,4,8,4,8,4,2,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  1,4,8,8,2,4,8,4,8,4,1,
  4,8,8,8,8,8,8,1,
  4,8,8,8,8,8,8,1,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  1,4,8,8,2,4,8,4,8,4,1,
  4,8,8,8,8,8,8,1,
  4,8,8,8,8,8,8,1,
];

let audioCtx    = null;
let melodyTimer = null;
let melodyOsc   = null;
let melodyIdx   = 0;
let melodyOn    = false;

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startMelody() {
  if (melodyOn) return;
  melodyOn  = true;
  melodyIdx = 0;
  playNextNote();
}

function stopMelody() {
  melodyOn = false;
  if (melodyTimer) { clearTimeout(melodyTimer); melodyTimer = null; }
  if (melodyOsc)   { try { melodyOsc.stop(); } catch(e){} melodyOsc = null; }
}

function playNextNote() {
  if (!melodyOn) return;
  const ac    = getAC();
  const freq  = MELODY_NOTES[melodyIdx % MELODY_NOTES.length];
  const dur   = MELODY_DURS[melodyIdx  % MELODY_DURS.length];
  const noteMs = 1000 / dur;
  const slotMs = noteMs * 1.3;

  if (melodyOsc) { try { melodyOsc.stop(); } catch(e){} melodyOsc = null; }

  if (freq > 0) {
    melodyOsc = ac.createOscillator();
    const gain = ac.createGain();
    melodyOsc.type = 'square';
    melodyOsc.frequency.value = freq;
    gain.gain.value = 0.04;
    melodyOsc.connect(gain);
    gain.connect(ac.destination);
    melodyOsc.start();
    // Release tone before slot ends (same as C3 firmware)
    setTimeout(() => { if (melodyOsc) { try { melodyOsc.stop(); } catch(e){} melodyOsc = null; } }, noteMs);
  }

  melodyTimer = setTimeout(() => {
    melodyIdx = (melodyIdx + 1) % MELODY_NOTES.length;
    playNextNote();
  }, slotMs);
}

// ─── Main game loop ───────────────────────────────────────────────────────────
let lastTime          = 0;
let prevStart         = false;
let menuColorDebounce = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  nowS     = timestamp / 1000;

  // ── Input ──
  const steer    = getSteer();
  const throttle = getThrottle();
  const start    = keys['Space'] || keys['Enter'];
  const startEdge = start && !prevStart;
  prevStart = start;

  // Phase transitions
  if (startEdge) {
    if (gs.phase === PHASE_MENU || gs.phase === PHASE_GAME_OVER) {
      resetGame();
      gs.phase = PHASE_PLAYING;
      startMelody();
    }
  }
  if (keys['KeyM'] && gs.phase === PHASE_GAME_OVER) {
    gs.phase = PHASE_MENU;
    stopMelody();
  }

  // Menu: cycle car color (arrow keys / A-D, with debounce)
  if (gs.phase === PHASE_MENU && nowS - menuColorDebounce > 0.28) {
    if (keys['ArrowLeft'] || keys['KeyA']) {
      selectedCarColor = (selectedCarColor + CAR_COLORS.length - 1) % CAR_COLORS.length;
      menuColorDebounce = nowS;
    } else if (keys['ArrowRight'] || keys['KeyD']) {
      selectedCarColor = (selectedCarColor + 1) % CAR_COLORS.length;
      menuColorDebounce = nowS;
    }
  }

  // ── Crash visual update (S3 game_loop_cb port) ──
  if (gs.phase === PHASE_CRASH_ANIM) {
    const elapsed  = Math.min((nowS - gs.crash_start_s) / CRASH_ANIM_S, 1.0);
    const push     = gs.crash_speed * 0.5;
    crashPlayerDy += push * 0.3  * dt;
    crashPlayerDx += push * 0.1  * dt;
    crashObsDy    -= push * 0.4  * dt;
    crashObsDx    -= push * 0.05 * dt;
    const shakeAmt = Math.min((1.0 - elapsed) * (gs.crash_speed / 40.0), 8.0);
    shakeX = (Math.random() * 2 - 1) * shakeAmt;
    shakeY = (Math.random() * 2 - 1) * shakeAmt;
    updateDebris(dt);
  }

  // ── Physics (C3 port) ──
  updatePhysics(dt, steer, throttle);

  // ── Render ──
  renderFrame();
  drawHUD();
  if (gs.phase === PHASE_MENU)      drawMenu();
  if (gs.phase === PHASE_GAME_OVER) drawGameOver();

  requestAnimationFrame(gameLoop);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
gs = { phase: PHASE_MENU, high_score: 0 };
resetGame();
gs.phase = PHASE_MENU;

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
