<script>
  // Theme Sync Logic
  const syncTheme = (mode) => {
    document.body.classList.toggle('light-mode', mode === 'light');
    document.documentElement.style.colorScheme = mode;
    
    // Update game colors based on theme if playing
    if (mode === 'light') {
        COL_GRASS = '#ecfdf5';
        COL_ROAD = '#e2e8f0';
        COL_SHOULDER = '#cbd5e1';
        COL_EDGE = '#94a3b8';
        COL_LANE_MARK = '#cbd5e1';
    } else {
        COL_GRASS = '#0A0A0A';
        COL_ROAD = '#181818';
        COL_SHOULDER = '#222222';
        COL_EDGE = '#333333';
        COL_LANE_MARK = '#444444';
    }
  };

  window.addEventListener('message', (e) => {
    if (e.data.type === 'theme-change') {
      syncTheme(e.data.mode);
    }
  });

  // Initial check for parent theme if possible
  try {
    if (window.parent && window.parent.document.body.dataset.themeMode) {
      setTimeout(() => syncTheme(window.parent.document.body.dataset.themeMode), 10);
    }
  } catch (e) {}
</script>
<canvas id="game"></canvas>

<div id="touch-controls">

<script>
/*
 * Freeway Frenzy – Web Port
 * Physics ported 1:1 from controller/main/main.c (ESP32-C3)
 * Rendering ported 1:1 from main/game_ui.c (ESP32-S3)
 * Keyboard replaces analog joystick; Web Audio API replaces buzzer.
 */

// ─── Touch setup ────────────────────────────────────────────────────────────
const touchDOM = document.getElementById('touch-controls');
touchDOM.addEventListener('touchstart', e => {
  if(e.target.dataset.key) {
    keys[e.target.dataset.key] = true;
    e.target.classList.add('active');
    
    // Auto-advance colors on Mobile if tapping start button before game starts
    if(e.target.dataset.key === 'Space' && gs && gs.phase === PHASE_MENU) {
      selectedCarColor = (selectedCarColor + 1) % CAR_COLORS.length;
    }
  }
});
touchDOM.addEventListener('touchend', e => {
  if(e.target.dataset.key) {
    keys[e.target.dataset.key] = false;
    e.target.classList.remove('active');
  }
});

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const SCR_W  = 1024;
const SCR_H  = 600;
canvas.width  = SCR_W;
canvas.height = SCR_H;

// Scale canvas to fit window while preserving aspect ratio
function resizeCanvas() {
  const scaleX = window.innerWidth  / SCR_W;
  const scaleY = window.innerHeight / SCR_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.style.width  = (SCR_W * scale) + 'px';
  canvas.style.height = (SCR_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Phases ──────────────────────────────────────────────────────────────────
const PHASE_MENU       = 0;
const PHASE_PLAYING    = 1;
const PHASE_CRASH_ANIM = 2;
const PHASE_GAME_OVER  = 3;

// ─── Logic-space constants (C3 / physics space: 512×300) ─────────────────────
const L_W            = 512;
const L_H            = 300;
const NUM_LANES      = 5;
const L_LANE_W       = 50;
const L_ROAD_W       = NUM_LANES * L_LANE_W;           // 250
const L_SHOULDER_W   = 15;
const L_TOTAL_ROAD_W = L_ROAD_W + L_SHOULDER_W * 2;    // 280
const L_ROAD_LEFT    = (L_W - L_TOTAL_ROAD_W) / 2;     // 116
const L_ROAD_SURF_L  = L_ROAD_LEFT + L_SHOULDER_W;     // 131
const L_LANE_CX      = lane => L_ROAD_SURF_L + L_LANE_W / 2 + lane * L_LANE_W;
const L_CAR_W        = 28;
const L_CAR_H        = 45;
const L_CAR_Y        = L_H - L_CAR_H - 15;             // 240
const L_OBS_W        = 26;
const L_OBS_H        = 42;
const MAX_OBSTACLES  = 12;
const CRASH_ANIM_S   = 1.2;
const BOOST_CHARGE_S = 4.0;
const BOOST_RELEASE_S = 2.4;
const BOOST_EXP_K    = 2.35;
const BOOST_MIN_GAIN = 0.55;
const BOOST_EXTRA_GAIN = 1.75;
const BOOST_MAX_SPEED = 820.0;

// ─── Render-space constants (S3 display: 1024×600 = C3 × 2) ──────────────────
const C3_SCALE       = 2;
const LANE_W         = L_LANE_W       * C3_SCALE;   // 100
const SHOULDER_W     = L_SHOULDER_W   * C3_SCALE;   // 30
const ROAD_W         = L_ROAD_W       * C3_SCALE;   // 500
const TOTAL_ROAD_W   = L_TOTAL_ROAD_W * C3_SCALE;   // 560
const ROAD_LEFT      = L_ROAD_LEFT    * C3_SCALE;   // 232
const ROAD_SURF_L    = L_ROAD_SURF_L  * C3_SCALE;   // 262
const ROAD_SURF_R    = ROAD_SURF_L + ROAD_W;         // 762
const ROAD_RIGHT     = ROAD_LEFT + TOTAL_ROAD_W;     // 792
const LANE_CX        = lane => ROAD_SURF_L + LANE_W / 2 + lane * LANE_W;
const CAR_W          = L_CAR_W  * C3_SCALE;  // 56
const CAR_H          = L_CAR_H  * C3_SCALE;  // 90
const CAR_Y          = L_CAR_Y  * C3_SCALE;  // 480
const OBS_W          = L_OBS_W  * C3_SCALE;  // 52
const OBS_H          = L_OBS_H  * C3_SCALE;  // 84
const DASH_LEN       = 40;
const GAP_LEN        = 30;
const DASH_CYCLE     = DASH_LEN + GAP_LEN;   // 70
const MAX_DEBRIS     = 10;

// ─── Colors (neon arcade palette) ────────────────────────────────────────────
let COL_GRASS     = '#05020F';
let COL_ROAD      = '#0B0718';
let COL_SHOULDER  = '#12092A';
let COL_EDGE      = '#2A1452';
let COL_LANE_MARK = '#4a3a7a';
const COL_CAR_WIND  = '#8ECAE6';
const COL_HEADLIGHT = '#FFFFDD';
const COL_TAILLIGHT = '#FF3355';
const COL_SHADOW    = 'rgba(0,0,0,0.55)';
const COL_NEON_L    = '#8b5cf6';
const COL_NEON_R    = '#ec4899';

const CAR_COLORS = [
  { name: 'Crimson',    body: '#FF2A4D', roof: '#B31230' },
  { name: 'Ocean Blue', body: '#2BA6FF', roof: '#1266C4' },
  { name: 'Lime',       body: '#3CE86A', roof: '#1E9442' },
  { name: 'Gold',       body: '#FFD23F', roof: '#C68B00' },
  { name: 'Purple',     body: '#A978FF', roof: '#6A37D9' },
  { name: 'Hot Pink',   body: '#FF56C0', roof: '#C31E82' },
  { name: 'Orange',     body: '#FF8A33', roof: '#C85A00' },
  { name: 'Silver',     body: '#D7DCE8', roof: '#8A93A8' },
];

const OBS_COLORS = ['#2BA6FF','#FFD23F','#3CE86A','#FF4F6B','#A978FF','#FF8A33','#4AE6E6'];

// ─── Game state ───────────────────────────────────────────────────────────────
let gs = {};
let selectedCarColor = 0;

function makeObs() {
  return { active: false, y: 0, lane: 0, type: 0 };
}

function normalizedExpRamp(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  return (Math.exp(BOOST_EXP_K * t) - 1.0) / (Math.exp(BOOST_EXP_K) - 1.0);
}

function resetGame() {
  const prevHigh = (gs.high_score || 0);
  const prevPhase = gs.phase;
  gs = {
    phase:             prevPhase,
    car_x:             L_LANE_CX(2),
    target_lane:       2,
    speed:             0,
    base_speed:        75.0,
    road_scroll:       gs.road_scroll || 0,
    distance:          0,
    score:             0,
    high_score:        prevHigh,
    obs:               Array.from({length: MAX_OBSTACLES}, makeObs),
    last_spawn_dist:   0,
    crash_start_s:     0,
    crash_obs_lane:    -1,
    crash_obs_y:       0,
    crash_speed:       0,
    last_lane_change_s:0,
    boost_hold_s:      0,
  };
}

// ─── PRNG (xorshift, same as C3) ─────────────────────────────────────────────
let _rng = 12345;
function fastRand() {
  _rng ^= _rng << 13;
  _rng ^= _rng >> 17;
  _rng ^= _rng << 5;
  return _rng >>> 0;
}

// ─── Obstacle management ──────────────────────────────────────────────────────
function maxActiveObs()   { return Math.min(1 + Math.floor(gs.score / 15), 8); }
function countActiveObs() { return gs.obs.filter(o => o.active).length; }

function laneClear(lane, spawnY) {
  for (const o of gs.obs) {
    if (!o.active || o.lane !== lane) continue;
    if (Math.abs(o.y - spawnY) < 120) return false;
  }
  return true;
}

function spawnOne() {
  if (countActiveObs() >= maxActiveObs()) return;
  const lane   = fastRand() % NUM_LANES;
  const spawnY = -L_OBS_H - 10;
  if (!laneClear(lane, spawnY)) return;
  for (const o of gs.obs) {
    if (!o.active) {
      o.active = true;
      o.lane   = lane;
      o.y      = spawnY;
      o.type   = fastRand() % 6;
      break;
    }
  }
}

// ─── Physics (1:1 port of C3 update_physics) ─────────────────────────────────
let nowS = 0;

function updatePhysics(dt, steer, throttle) {
  if (gs.phase === PHASE_MENU) {
    gs.road_scroll += 40.0 * dt;
    if (gs.road_scroll > 100000) gs.road_scroll -= 100000;
    gs.speed = 0;
    gs.car_x = L_LANE_CX(2);
    return;
  }
  if (gs.phase === PHASE_GAME_OVER) return;

  if (gs.phase === PHASE_CRASH_ANIM) {
    gs.speed *= (1.0 - 3.0 * dt);
    if (gs.speed < 5) gs.speed = 0;
    gs.road_scroll += gs.speed * 2.5 * dt;
    if (gs.road_scroll > 100000) gs.road_scroll -= 100000;
    if (nowS - gs.crash_start_s >= CRASH_ANIM_S) {
      if (gs.score > gs.high_score) gs.high_score = gs.score;
      gs.phase = PHASE_GAME_OVER;
    }
    return;
  }

  // PHASE_PLAYING
  // Lane change with 150ms cooldown
  if (nowS - gs.last_lane_change_s > 0.15) {
    if (steer < -40 && gs.target_lane > 0) {
      gs.target_lane--;
      gs.last_lane_change_s = nowS;
    }
    if (steer > 40 && gs.target_lane < NUM_LANES - 1) {
      gs.target_lane++;
      gs.last_lane_change_s = nowS;
    }
  }

  // Smooth car position toward target lane
  const tx   = L_LANE_CX(gs.target_lane);
  const lerp = Math.min(12.0 * dt, 1.0);
  gs.car_x += (tx - gs.car_x) * lerp;

  // Speed
  gs.base_speed = Math.min(75.0 + gs.distance * 0.045, 250.0);
  const speed_mod = throttle * 0.01;
  const boosting  = speed_mod > 0.1;

  if (boosting) {
    gs.boost_hold_s = Math.min(gs.boost_hold_s + dt, BOOST_CHARGE_S);
  } else {
    gs.boost_hold_s = Math.max(gs.boost_hold_s - dt * BOOST_RELEASE_S, 0.0);
  }
  const boost_ramp = Math.min(gs.boost_hold_s / BOOST_CHARGE_S, 1.0);
  const boost_curve = normalizedExpRamp(boost_ramp);

  let target_speed;
  if (boosting) {
    const boost_strength = BOOST_MIN_GAIN + boost_curve * BOOST_EXTRA_GAIN;
    target_speed = Math.min(gs.base_speed * (1.0 + speed_mod * boost_strength), BOOST_MAX_SPEED);
  } else if (speed_mod < -0.1) {
    target_speed = Math.max(gs.base_speed * (1.0 + speed_mod * 0.75), 15.0);
  } else {
    target_speed = gs.base_speed;
  }
  const sp_lerp = speed_mod < -0.1 ? 5.0 : (boosting ? 3.2 + boost_curve * 2.4 : 3.0);
  gs.speed += (target_speed - gs.speed) * sp_lerp * dt;
  if (gs.speed < 0) gs.speed = 0;

  // Road scroll and distance
  gs.road_scroll += gs.speed * 2.5 * dt;
  if (gs.road_scroll > 100000) gs.road_scroll -= 100000;
  gs.distance += gs.speed * dt * 0.3;
  gs.score = Math.floor(gs.distance / 10);

  // Obstacle spawn
  gs.last_spawn_dist += gs.speed * 2.0 * dt;
  const spawn_gap = Math.max(140.0 - gs.score * 0.8, 70.0);
  if (gs.last_spawn_dist >= spawn_gap) {
    gs.last_spawn_dist -= spawn_gap;
    spawnOne();
  }

  // Scroll obstacles downward
  const obs_speed = gs.speed * 1.8 + 30.0;
  for (const o of gs.obs) {
    if (!o.active) continue;
    o.y += obs_speed * dt;
    if (o.y > L_H + 50) o.active = false;
  }

  // AABB collision detection
  const car_l = gs.car_x - L_CAR_W / 2;
  const car_r = gs.car_x + L_CAR_W / 2;
  const car_t = L_CAR_Y;
  const car_b = L_CAR_Y + L_CAR_H;

  for (const o of gs.obs) {
    if (!o.active) continue;
    const ox = L_LANE_CX(o.lane);
    const ol = ox - L_OBS_W / 2, or_ = ox + L_OBS_W / 2;
    const ot = o.y,               ob  = o.y + L_OBS_H;
    if (car_l < or_ && car_r > ol && car_t < ob && car_b > ot) {
      gs.phase          = PHASE_CRASH_ANIM;
      gs.crash_start_s  = nowS;
      gs.crash_speed    = gs.speed;
      gs.crash_obs_lane = o.lane;
      gs.crash_obs_y    = o.y;
      // Reset crash visual offsets
      crashPlayerDx = crashPlayerDy = crashObsDx = crashObsDy = 0;
      shakeX = shakeY = 0;
      spawnDebris(
        (gs.car_x * C3_SCALE + LANE_CX(o.lane)) / 2,
        (o.y * C3_SCALE + CAR_Y) / 2,
        gs.speed
      );
      stopMelody();
      return;
    }
  }
}

// ─── Crash visual state ───────────────────────────────────────────────────────
let crashPlayerDx = 0, crashPlayerDy = 0;
let crashObsDx = 0, crashObsDy = 0;
let shakeX = 0, shakeY = 0;
let debris = [];

function spawnDebris(cx, cy, speed) {
  const colors = ['#FF4400','#FFAA00','#FF0000','#CCCCCC','#888888','#FFFF44'];
  debris = [];
  for (let i = 0; i < MAX_DEBRIS; i++) {
    const angle = Math.random() * Math.PI * 2;
    const mag   = 60 + Math.random() * (speed * 1.2 + 40);
    debris.push({
      active: true,
      x: cx + (Math.random() * 30 - 15),
      y: cy + (Math.random() * 30 - 15),
      vx: Math.cos(angle) * mag,
      vy: Math.sin(angle) * mag,
      size: 2 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * 6)],
    });
  }
}

function updateDebris(dt) {
  for (const d of debris) {
    if (!d.active) continue;
    d.x    += d.vx * dt;
    d.y    += d.vy * dt;
    d.vy   += 200 * dt;
    d.vx   *= 0.97;
    d.size -= 2.5 * dt;
    if (d.size <= 0.5 || d.y > SCR_H + 20) d.active = false;
  }
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
});
window.addEventListener('keyup',   e => { keys[e.code] = false; });

function getSteer() {
  if (gs.phase !== PHASE_PLAYING) return 0;
  if (keys['ArrowLeft']  || keys['KeyA']) return -100;
  if (keys['ArrowRight'] || keys['KeyD']) return  100;
  return 0;
}

function getThrottle() {
  if (gs.phase !== PHASE_PLAYING) return 0;
  if (keys['ArrowUp']   || keys['KeyW']) return  100;
  if (keys['ArrowDown'] || keys['KeyS']) return -100;
  return 0;
}

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function fillRect(x, y, w, h, color) {
  if (w <= 0 || h <= 0) return;
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function blendHex(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3), 16);
  const g1 = parseInt(hex1.slice(3,5), 16);
  const b1 = parseInt(hex1.slice(5,7), 16);
  const r2 = parseInt(hex2.slice(1,3), 16);
  const g2 = parseInt(hex2.slice(3,5), 16);
  const b2 = parseInt(hex2.slice(5,7), 16);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ─── Road rendering ───────────────────────────────────────────────────────────
function drawRoad(scrollOverride) {
  const scroll = scrollOverride !== undefined ? scrollOverride : gs.road_scroll * C3_SCALE;

  // Backdrop — deep purple/black vignette
  const bg = ctx.createLinearGradient(0, 0, SCR_W, SCR_H);
  bg.addColorStop(0,    '#0a0520');
  bg.addColorStop(0.5,  '#05020F');
  bg.addColorStop(1,    '#120826');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, SCR_W, SCR_H);

  // Neon purple glow on the left side of screen
  const glowL = ctx.createRadialGradient(ROAD_LEFT - 40, SCR_H * 0.55, 0, ROAD_LEFT - 40, SCR_H * 0.55, SCR_W * 0.45);
  glowL.addColorStop(0, 'rgba(139, 92, 246, 0.35)');
  glowL.addColorStop(1, 'rgba(139, 92, 246, 0)');
  ctx.fillStyle = glowL;
  ctx.fillRect(0, 0, SCR_W * 0.5, SCR_H);

  // Neon pink glow on the right side
  const glowR = ctx.createRadialGradient(ROAD_RIGHT + 40, SCR_H * 0.6, 0, ROAD_RIGHT + 40, SCR_H * 0.6, SCR_W * 0.45);
  glowR.addColorStop(0, 'rgba(236, 72, 153, 0.38)');
  glowR.addColorStop(1, 'rgba(236, 72, 153, 0)');
  ctx.fillStyle = glowR;
  ctx.fillRect(SCR_W * 0.5, 0, SCR_W * 0.5, SCR_H);

  // Road surface with subtle vertical gradient (lighter at horizon)
  const rg = ctx.createLinearGradient(0, 0, 0, SCR_H);
  rg.addColorStop(0, '#150a2e');
  rg.addColorStop(0.35, '#0B0718');
  rg.addColorStop(1, '#0B0718');
  ctx.fillStyle = rg;
  ctx.fillRect(ROAD_LEFT, 0, TOTAL_ROAD_W, SCR_H);

  // Shoulders
  fillRect(ROAD_LEFT,  0, SHOULDER_W, SCR_H, COL_SHOULDER);
  fillRect(ROAD_SURF_R, 0, SHOULDER_W, SCR_H, COL_SHOULDER);

  // Neon edge stripes (purple left, pink right) with glow
  ctx.save();
  ctx.shadowBlur = 18;
  ctx.shadowColor = COL_NEON_L;
  fillRect(ROAD_SURF_L - 4, 0, 3, SCR_H, COL_NEON_L);
  ctx.shadowColor = COL_NEON_R;
  fillRect(ROAD_SURF_R + 1, 0, 3, SCR_H, COL_NEON_R);
  ctx.restore();

  // Dashed lane markings with soft glow
  ctx.save();
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(180, 160, 255, 0.45)';
  ctx.fillStyle = '#7a6ab8';
  const scrollMod = ((Math.floor(scroll) % DASH_CYCLE) + DASH_CYCLE) % DASH_CYCLE;
  for (let ld = 1; ld < NUM_LANES; ld++) {
    const cx = ROAD_SURF_L + ld * LANE_W;
    for (let startY = scrollMod - DASH_CYCLE; startY < SCR_H + DASH_CYCLE; startY += DASH_CYCLE) {
      ctx.fillRect(cx - 2, Math.floor(startY), 4, DASH_LEN);
    }
  }
  ctx.restore();

  // Horizon vignette top
  const topV = ctx.createLinearGradient(0, 0, 0, 140);
  topV.addColorStop(0, 'rgba(0,0,0,0.65)');
  topV.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topV;
  ctx.fillRect(0, 0, SCR_W, 140);
}

// ─── Car rendering (port of draw_car from game_ui.c) ─────────────────────────
function drawCar(cx, cy, w, h, bodyColor, roofColor, isPlayer) {
  const x0 = cx - w / 2;
  const ri  = Math.floor(w / 4);
  const ws_h = Math.floor(h / 6);

  fillRect(x0 + 2, cy + 2, w, h, COL_SHADOW);           // shadow
  fillRect(x0,     cy,     w, h, bodyColor);             // body
  fillRect(x0 + ri, cy + Math.floor(h / 4), w - ri * 2, Math.floor(h / 3), roofColor); // roof

  // Windshield — player faces up, obstacles face down
  if (isPlayer) {
    fillRect(x0 + ri + 1, cy + 4, w - ri * 2 - 2, ws_h, COL_CAR_WIND);
  } else {
    fillRect(x0 + ri + 1, cy + h - ws_h - 5, w - ri * 2 - 2, ws_h, COL_CAR_WIND);
  }

  // Taillights
  fillRect(x0 + 2,     cy + h - 4, 5, 3, COL_TAILLIGHT);
  fillRect(x0 + w - 7, cy + h - 4, 5, 3, COL_TAILLIGHT);

  // Headlights (player only, at top)
  if (isPlayer) {
    fillRect(x0 + 2,     cy + 1, 4, 2, COL_HEADLIGHT);
    fillRect(x0 + w - 6, cy + 1, 4, 2, COL_HEADLIGHT);
  }
}

function drawCarDamaged(cx, cy, w, h, bodyColor, progress, isPlayer) {
  const x0 = cx - w / 2;
  fillRect(x0 + 2, cy + 2, w, h, COL_SHADOW);

  const cv  = Math.floor(progress * 8);
  const ch  = Math.floor(progress * 3);
  const dw  = w + ch;
  const dh  = Math.max(h - cv, Math.floor(h / 2));
  const dx0 = cx - dw / 2;

  const dmg = blendHex(bodyColor, '#333333', progress * 0.47);
  fillRect(dx0, cy, dw, dh, dmg);

  const crush = Math.floor(progress * 12);
  if (crush > 2) {
    if (isPlayer) fillRect(dx0 + 2, cy,          dw - 4, crush, '#1A1A1A');
    else          fillRect(dx0 + 2, cy + dh - crush, dw - 4, crush, '#1A1A1A');
  }

  // Fire
  if (progress < 0.8 && Math.random() > 0.33) {
    const fires = ['#FF4400','#FFAA00','#FF0000'];
    const fw = 4 + Math.floor(Math.random() * 6);
    const fh = 3 + Math.floor(Math.random() * 5);
    const fx = cx - fw / 2 + Math.floor(Math.random() * 8) - 4;
    const fy = isPlayer ? cy - fh : cy + dh;
    fillRect(fx, fy, fw, fh, fires[Math.floor(Math.random() * 3)]);
  }
}

// ─── Scene rendering ──────────────────────────────────────────────────────────
function renderFrame() {
  ctx.save();

  if (gs.phase === PHASE_CRASH_ANIM) {
    ctx.translate(shakeX, shakeY);
  }

  drawRoad();

  // Obstacles
  for (const o of gs.obs) {
    if (!o.active) continue;
    const oy = o.y * C3_SCALE;
    if (oy + OBS_H < 0 || oy > SCR_H) continue;
    drawCar(LANE_CX(o.lane), oy, OBS_W, OBS_H, OBS_COLORS[o.type % 6], '#111111', false);
  }

  if (gs.phase === PHASE_CRASH_ANIM) {
    const elapsed = Math.min((nowS - gs.crash_start_s) / CRASH_ANIM_S, 1.0);

    // Skid marks
    const skidLen = Math.floor(elapsed * 60);
    const pcx     = Math.round(gs.car_x * C3_SCALE + crashPlayerDx);
    const pcy     = CAR_Y + Math.round(crashPlayerDy);
    fillRect(pcx - 8, pcy, 3, skidLen, '#222222');
    fillRect(pcx + 5, pcy, 3, skidLen, '#222222');

    drawCarDamaged(pcx, pcy, CAR_W, CAR_H, CAR_COLORS[selectedCarColor].body, elapsed, true);

    if (gs.crash_obs_lane >= 0 && gs.crash_obs_lane < NUM_LANES) {
      const ocx = LANE_CX(gs.crash_obs_lane) + Math.round(crashObsDx);
      const ocy = gs.crash_obs_y * C3_SCALE + Math.round(crashObsDy);
      drawCarDamaged(ocx, ocy, OBS_W, OBS_H, '#888888', elapsed, false);
    }

    // Debris particles
    for (const d of debris) {
      if (!d.active) continue;
      fillRect(d.x, d.y, Math.max(1, Math.floor(d.size)), Math.max(1, Math.floor(d.size)), d.color);
    }
  } else {
    // Player car (not drawn during game over)
    if (gs.phase !== PHASE_GAME_OVER) {
      drawCar(gs.car_x * C3_SCALE, CAR_Y, CAR_W, CAR_H,
              CAR_COLORS[selectedCarColor].body,
              CAR_COLORS[selectedCarColor].roof, true);
    }
  }

  ctx.restore();
}

// ─── 3D (pseudo-perspective) renderer ────────────────────────────────────────
let render3D = false;
const HORIZON_Y       = 215;
const PERSPECTIVE_POW = 1.55;
const FAR_SCALE       = 0.14;

// Project a point from logic space (L_W × L_H) into screen space with perspective.
// worldY: 0 at horizon (far), L_H at player (near).
function project3D(worldX, worldY) {
  const t = Math.max(0, Math.min(1, worldY / L_H));
  const depth = Math.pow(t, PERSPECTIVE_POW);
  const scale = FAR_SCALE + (1 - FAR_SCALE) * depth;
  const screenY = HORIZON_Y + (SCR_H - HORIZON_Y) * depth;
  const screenX = SCR_W / 2 + (worldX - L_W / 2) * C3_SCALE * scale;
  return { x: screenX, y: screenY, scale, depth };
}

// ── Cached static decor (stars, mountains) ───────────────────────────────────
let _starField = null;
function getStarField() {
  if (_starField) return _starField;
  const stars = [];
  let s = 987654321;
  const rnd = () => { s ^= s << 13; s ^= s >>> 17; s ^= s << 5; return (s >>> 0) / 4294967295; };
  for (let i = 0; i < 140; i++) {
    stars.push({
      x: rnd() * SCR_W,
      y: rnd() * (HORIZON_Y - 20),
      r: 0.5 + rnd() * 1.6,
      a: 0.25 + rnd() * 0.75,
      tw: rnd() * Math.PI * 2,
    });
  }
  _starField = stars;
  return stars;
}

let _farMountains = null;
let _nearMountains = null;
function getMountains(seed, count, baseH, varH, width) {
  let s = seed;
  const rnd = () => { s ^= s << 13; s ^= s >>> 17; s ^= s << 5; return (s >>> 0) / 4294967295; };
  const pts = [];
  for (let i = 0; i <= count; i++) {
    const x = (i / count) * width;
    const h = baseH + rnd() * varH;
    pts.push({ x, h });
  }
  return pts;
}
function getFarMountains()  { return _farMountains  || (_farMountains  = getMountains(11111,  30, 22, 28, SCR_W * 1.2)); }
function getNearMountains() { return _nearMountains || (_nearMountains = getMountains(424242, 22, 38, 50, SCR_W * 1.2)); }

function drawMountainBand(pts, offsetX, color, glow) {
  ctx.save();
  if (glow) {
    ctx.shadowColor = glow;
    ctx.shadowBlur = 18;
  }
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-offsetX - 50, HORIZON_Y);
  for (const p of pts) {
    ctx.lineTo(p.x - offsetX, HORIZON_Y - p.h);
  }
  ctx.lineTo((pts[pts.length - 1]?.x || SCR_W) - offsetX + 50, HORIZON_Y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawRoad3D(scrollOverride) {
  const scroll = scrollOverride !== undefined ? scrollOverride : gs.road_scroll * C3_SCALE;
  const speedNorm = Math.min(gs.speed / 250, 1.2);

  // ── 1. Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  sky.addColorStop(0,    '#0a0324');
  sky.addColorStop(0.4,  '#1a0540');
  sky.addColorStop(0.8,  '#45145e');
  sky.addColorStop(1,    '#7a1565');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, SCR_W, HORIZON_Y);

  // ── 2. Star field with subtle twinkle
  ctx.save();
  for (const st of getStarField()) {
    const tw = 0.65 + 0.35 * Math.sin(nowS * 2.2 + st.tw);
    ctx.fillStyle = `rgba(255, 230, 255, ${(st.a * tw).toFixed(3)})`;
    ctx.fillRect(st.x, st.y, st.r, st.r);
  }
  ctx.restore();

  // ── 3. Synthwave sun (gradient disc) with horizontal scan-line cuts
  const sunCX = SCR_W / 2;
  const sunCY = HORIZON_Y + 6;
  const sunR = 95;
  ctx.save();
  ctx.beginPath();
  ctx.arc(sunCX, sunCY, sunR, Math.PI, 2 * Math.PI);
  ctx.closePath();
  const sunGrad = ctx.createLinearGradient(sunCX, sunCY - sunR, sunCX, sunCY);
  sunGrad.addColorStop(0,    '#ffe680');
  sunGrad.addColorStop(0.45, '#ff8ac2');
  sunGrad.addColorStop(1,    '#7a2db8');
  ctx.fillStyle = sunGrad;
  ctx.fill();
  // Scan line cuts (retro synthwave)
  ctx.globalCompositeOperation = 'destination-out';
  const cuts = 6;
  for (let i = 1; i <= cuts; i++) {
    const bandY = sunCY - sunR + (i / (cuts + 1)) * sunR;
    const bandH = 3 + (cuts - i) * 1.1;
    ctx.fillRect(sunCX - sunR - 10, bandY, sunR * 2 + 20, bandH);
  }
  ctx.restore();

  // Sun bloom halo
  const sunBloom = ctx.createRadialGradient(sunCX, sunCY, sunR * 0.4, sunCX, sunCY, sunR * 3.5);
  sunBloom.addColorStop(0,   'rgba(255, 180, 220, 0.45)');
  sunBloom.addColorStop(0.5, 'rgba(236, 72, 153, 0.18)');
  sunBloom.addColorStop(1,   'rgba(139, 92, 246, 0)');
  ctx.fillStyle = sunBloom;
  ctx.fillRect(0, 0, SCR_W, HORIZON_Y + 40);

  // ── 4. Parallax mountains (two layers, drift with scroll)
  const mountainScroll = (scroll * 0.015) % (SCR_W * 0.6);
  drawMountainBand(getFarMountains(),  mountainScroll * 0.5, 'rgba(35, 15, 70, 0.95)', 'rgba(139, 92, 246, 0.25)');
  drawMountainBand(getNearMountains(), mountainScroll,       'rgba(18, 8, 40, 0.98)',   null);

  // Horizon neon glow line
  ctx.save();
  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(255, 120, 200, 0.9)';
  ctx.strokeStyle = 'rgba(255, 210, 235, 0.85)';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y);
  ctx.lineTo(SCR_W, HORIZON_Y);
  ctx.stroke();
  ctx.restore();

  // ── 5. Ground plane (below horizon) with purple→black gradient
  const ground = ctx.createLinearGradient(0, HORIZON_Y, 0, SCR_H);
  ground.addColorStop(0,   '#15062e');
  ground.addColorStop(0.3, '#0a0320');
  ground.addColorStop(1,   '#03010a');
  ctx.fillStyle = ground;
  ctx.fillRect(0, HORIZON_Y, SCR_W, SCR_H - HORIZON_Y);

  // ── 6. Wireframe ground grid (outrun-style, rushing toward viewer)
  drawGroundGrid(scroll);

  // Side neon glows over the grid for atmosphere
  const glowL = ctx.createLinearGradient(0, HORIZON_Y, SCR_W * 0.4, SCR_H);
  glowL.addColorStop(0, 'rgba(139, 92, 246, 0.28)');
  glowL.addColorStop(1, 'rgba(139, 92, 246, 0)');
  ctx.fillStyle = glowL;
  ctx.fillRect(0, HORIZON_Y, SCR_W * 0.5, SCR_H - HORIZON_Y);

  const glowR = ctx.createLinearGradient(SCR_W, HORIZON_Y, SCR_W * 0.6, SCR_H);
  glowR.addColorStop(0, 'rgba(236, 72, 153, 0.32)');
  glowR.addColorStop(1, 'rgba(236, 72, 153, 0)');
  ctx.fillStyle = glowR;
  ctx.fillRect(SCR_W * 0.5, HORIZON_Y, SCR_W * 0.5, SCR_H - HORIZON_Y);

  // ── 7. Road trapezoid
  const nearL = project3D(L_ROAD_LEFT,                 L_H);
  const nearR = project3D(L_ROAD_LEFT + L_TOTAL_ROAD_W, L_H);
  const farL  = project3D(L_ROAD_LEFT,                 0);
  const farR  = project3D(L_ROAD_LEFT + L_TOTAL_ROAD_W, 0);

  ctx.fillStyle = '#090416';
  ctx.beginPath();
  ctx.moveTo(farL.x,  farL.y);
  ctx.lineTo(farR.x,  farR.y);
  ctx.lineTo(nearR.x, nearR.y);
  ctx.lineTo(nearL.x, nearL.y);
  ctx.closePath();
  ctx.fill();

  // Banded road surface (alternating shade bands scroll toward viewer)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(farL.x,  farL.y);
  ctx.lineTo(farR.x,  farR.y);
  ctx.lineTo(nearR.x, nearR.y);
  ctx.lineTo(nearL.x, nearL.y);
  ctx.closePath();
  ctx.clip();
  const BAND_H_WORLD = 20;
  const scrollW = (scroll / C3_SCALE) % (BAND_H_WORLD * 2);
  for (let wy = 0; wy < L_H + BAND_H_WORLD * 2; wy += BAND_H_WORLD * 2) {
    const y0 = wy + scrollW;
    const y1 = y0 + BAND_H_WORLD;
    if (y1 < 0 || y0 > L_H) continue;
    const p0 = project3D(L_W / 2, Math.max(0, y0));
    const p1 = project3D(L_W / 2, Math.min(L_H, y1));
    const lerpT = (y0 / L_H);
    const alpha = 0.06 + lerpT * 0.04;
    ctx.fillStyle = `rgba(120, 70, 180, ${alpha})`;
    ctx.fillRect(0, p0.y, SCR_W, p1.y - p0.y + 1);
  }
  ctx.restore();

  // Reflection gloss running down the center of the road
  ctx.save();
  const gloss = ctx.createLinearGradient(0, farL.y, 0, nearL.y);
  gloss.addColorStop(0,   'rgba(255, 180, 230, 0.12)');
  gloss.addColorStop(0.3, 'rgba(255, 120, 200, 0.06)');
  gloss.addColorStop(1,   'rgba(255, 120, 200, 0)');
  ctx.fillStyle = gloss;
  ctx.beginPath();
  ctx.moveTo(farL.x,  farL.y);
  ctx.lineTo(farR.x,  farR.y);
  ctx.lineTo(nearR.x, nearR.y);
  ctx.lineTo(nearL.x, nearL.y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Shoulders
  const nearSL_in = project3D(L_ROAD_SURF_L, L_H);
  const farSL_in  = project3D(L_ROAD_SURF_L, 0);
  const nearSR_in = project3D(L_ROAD_SURF_L + L_ROAD_W, L_H);
  const farSR_in  = project3D(L_ROAD_SURF_L + L_ROAD_W, 0);

  ctx.fillStyle = '#0f072a';
  ctx.beginPath();
  ctx.moveTo(farL.x, farL.y);
  ctx.lineTo(farSL_in.x, farSL_in.y);
  ctx.lineTo(nearSL_in.x, nearSL_in.y);
  ctx.lineTo(nearL.x, nearL.y);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(farSR_in.x, farSR_in.y);
  ctx.lineTo(farR.x, farR.y);
  ctx.lineTo(nearR.x, nearR.y);
  ctx.lineTo(nearSR_in.x, nearSR_in.y);
  ctx.closePath();
  ctx.fill();

  // ── 8. Neon edge stripes with strong glow (double-pass for bloom)
  ctx.save();
  ctx.lineCap = 'round';
  // Outer bloom pass
  ctx.globalAlpha = 0.4;
  ctx.shadowBlur = 32;
  ctx.shadowColor = COL_NEON_L;
  ctx.strokeStyle = COL_NEON_L;
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.moveTo(farSL_in.x, farSL_in.y);
  ctx.lineTo(nearSL_in.x, nearSL_in.y);
  ctx.stroke();
  ctx.shadowColor = COL_NEON_R;
  ctx.strokeStyle = COL_NEON_R;
  ctx.beginPath();
  ctx.moveTo(farSR_in.x, farSR_in.y);
  ctx.lineTo(nearSR_in.x, nearSR_in.y);
  ctx.stroke();
  // Inner bright core
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 16;
  ctx.strokeStyle = '#f0aef0';
  ctx.lineWidth = 3;
  ctx.shadowColor = COL_NEON_L;
  ctx.beginPath();
  ctx.moveTo(farSL_in.x, farSL_in.y);
  ctx.lineTo(nearSL_in.x, nearSL_in.y);
  ctx.stroke();
  ctx.shadowColor = COL_NEON_R;
  ctx.beginPath();
  ctx.moveTo(farSR_in.x, farSR_in.y);
  ctx.lineTo(nearSR_in.x, nearSR_in.y);
  ctx.stroke();
  ctx.restore();

  // ── 9. Lane dashes in perspective (with glow)
  ctx.save();
  ctx.shadowBlur = 10;
  ctx.shadowColor = 'rgba(200, 180, 255, 0.7)';
  ctx.fillStyle = '#b8a8ff';
  const scrollMod = ((Math.floor(scroll) % DASH_CYCLE) + DASH_CYCLE) % DASH_CYCLE;
  for (let ld = 1; ld < NUM_LANES; ld++) {
    const laneX = L_ROAD_SURF_L + ld * L_LANE_W;
    const offset = scrollMod / C3_SCALE;
    for (let dy = -DASH_CYCLE / C3_SCALE; dy < L_H + DASH_CYCLE / C3_SCALE; dy += DASH_CYCLE / C3_SCALE) {
      const y0 = (dy + offset);
      const yTop = y0;
      const yBot = y0 + DASH_LEN / C3_SCALE;
      if (yBot < 0 || yTop > L_H) continue;
      const pTop = project3D(laneX, Math.max(0, yTop));
      const pBot = project3D(laneX, Math.min(L_H, yBot));
      const w = Math.max(1, 4 * pBot.scale);
      ctx.beginPath();
      ctx.moveTo(pTop.x - w / 2, pTop.y);
      ctx.lineTo(pTop.x + w / 2, pTop.y);
      ctx.lineTo(pBot.x + (w * 1.05) / 2, pBot.y);
      ctx.lineTo(pBot.x - (w * 1.05) / 2, pBot.y);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();

  // ── 10. Roadside reflector posts (pulse on a rhythm as they scroll past)
  drawReflectorPosts(scroll);

  // ── 11. Ground fog band near horizon
  const fog = ctx.createLinearGradient(0, HORIZON_Y - 4, 0, HORIZON_Y + 70);
  fog.addColorStop(0,   'rgba(255, 180, 220, 0.28)');
  fog.addColorStop(0.4, 'rgba(180, 120, 220, 0.15)');
  fog.addColorStop(1,   'rgba(139, 92, 246, 0)');
  ctx.fillStyle = fog;
  ctx.fillRect(0, HORIZON_Y - 4, SCR_W, 70);

  // ── 12. Speed streaks when boosting
  if (gs.phase === PHASE_PLAYING && speedNorm > 0.55) {
    drawSpeedStreaks(speedNorm);
  }
}

// ── Outrun-style wireframe ground grid (off-road on both sides) ──────────────
function drawGroundGrid(scroll) {
  ctx.save();

  // Horizontal (perpendicular) lines — appear to rush toward viewer
  const ROW_SPACING_WORLD = 15;  // logic units
  const scrollW = (scroll / C3_SCALE) % ROW_SPACING_WORLD;
  ctx.lineCap = 'round';
  for (let wy = -ROW_SPACING_WORLD; wy <= L_H + ROW_SPACING_WORLD; wy += ROW_SPACING_WORLD) {
    const y = wy + scrollW;
    if (y < 0 || y > L_H) continue;
    const p = project3D(0, y);
    const alpha = Math.max(0, Math.min(1, (y / L_H) * 0.75 + 0.05));
    // Left side: purple
    ctx.globalAlpha = alpha * 0.8;
    ctx.shadowBlur = 6;
    ctx.shadowColor = COL_NEON_L;
    ctx.strokeStyle = 'rgba(139, 92, 246, 0.9)';
    ctx.lineWidth = Math.max(0.5, 1.2 * p.scale);
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(project3D(L_ROAD_LEFT - 6, y).x, p.y);
    ctx.stroke();
    // Right side: pink
    ctx.shadowColor = COL_NEON_R;
    ctx.strokeStyle = 'rgba(236, 72, 153, 0.9)';
    ctx.beginPath();
    ctx.moveTo(project3D(L_ROAD_LEFT + L_TOTAL_ROAD_W + 6, y).x, p.y);
    ctx.lineTo(SCR_W, p.y);
    ctx.stroke();
  }

  // Radial lines (toward vanishing point) — sampled x positions beyond the road
  ctx.globalAlpha = 0.55;
  ctx.lineWidth = 1;
  const vanishX = SCR_W / 2;
  const radialOffsets = [-3, -2, -1.5, -1.1, 1.1, 1.5, 2, 3];
  for (const mult of radialOffsets) {
    const startX = L_W / 2 + mult * (L_TOTAL_ROAD_W / 2);
    const nearP = project3D(startX, L_H);
    if (nearP.x < -50 || nearP.x > SCR_W + 50) continue;
    ctx.shadowBlur = 4;
    if (mult < 0) {
      ctx.shadowColor = COL_NEON_L;
      ctx.strokeStyle = 'rgba(139, 92, 246, 0.55)';
    } else {
      ctx.shadowColor = COL_NEON_R;
      ctx.strokeStyle = 'rgba(236, 72, 153, 0.55)';
    }
    ctx.beginPath();
    ctx.moveTo(nearP.x, nearP.y);
    ctx.lineTo(vanishX, HORIZON_Y);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Glowing reflector posts along the road edges ─────────────────────────────
function drawReflectorPosts(scroll) {
  const POST_SPACING_WORLD = 30;
  const scrollW = (scroll / C3_SCALE) % POST_SPACING_WORLD;
  ctx.save();
  for (let wy = 0; wy <= L_H + POST_SPACING_WORLD; wy += POST_SPACING_WORLD) {
    const y = wy + scrollW;
    if (y < 0 || y > L_H) continue;
    // Left (purple) and right (pink) posts
    const lp = project3D(L_ROAD_LEFT - 4, y);
    const rp = project3D(L_ROAD_LEFT + L_TOTAL_ROAD_W + 4, y);
    const size = Math.max(1.2, 5 * lp.scale);
    // Pulse brightness per post index based on world y and time
    const pulse = 0.5 + 0.5 * Math.sin(nowS * 4 + wy * 0.1);

    ctx.shadowBlur = 16;
    ctx.shadowColor = COL_NEON_L;
    ctx.fillStyle = `rgba(186, 160, 255, ${0.55 + 0.45 * pulse})`;
    ctx.beginPath();
    ctx.arc(lp.x, lp.y, size, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowColor = COL_NEON_R;
    ctx.fillStyle = `rgba(255, 170, 220, ${0.55 + 0.45 * pulse})`;
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Speed streaks overlay (when moving fast) ─────────────────────────────────
function drawSpeedStreaks(speedNorm) {
  ctx.save();
  const n = Math.floor(8 + speedNorm * 14);
  const t = nowS * (6 + speedNorm * 8);
  for (let i = 0; i < n; i++) {
    const seed = (i * 37.23 + Math.floor(t) * 0.17);
    const sx = ((Math.sin(seed) * 0.5 + 0.5) * SCR_W);
    const yProg = ((t * (0.4 + speedNorm) + i * 0.2) % 1);
    const y = HORIZON_Y + yProg * (SCR_H - HORIZON_Y);
    const len = 30 + yProg * 80;
    const isLeft = sx < SCR_W / 2;
    const dx = isLeft ? (SCR_W / 2 - sx) : (sx - SCR_W / 2);
    const spread = dx * yProg * 0.8;
    const endX = isLeft ? sx - spread : sx + spread;
    const endY = Math.min(SCR_H, y + len);
    const g = ctx.createLinearGradient(sx, y, endX, endY);
    g.addColorStop(0, 'rgba(255, 180, 230, 0)');
    g.addColorStop(0.5, `rgba(255, 180, 230, ${0.25 * speedNorm})`);
    g.addColorStop(1, 'rgba(255, 180, 230, 0)');
    ctx.strokeStyle = g;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(sx, y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
  }
  ctx.restore();
}

// Draws a chunky pseudo-3D car — body base, angled windshield, rear/roof
// highlight and glowing taillights. Player variant shows headlights up top.
function drawCar3D(px, py, scale, bodyColor, roofColor, isPlayer, damagedProgress) {
  const w = CAR_W * scale * 1.15;
  const h = CAR_H * scale * 1.15;
  const x0 = px - w / 2;
  const y0 = py - h;                  // "feet" at py
  const hoodH = h * 0.32;              // front slab (near viewer)
  const cabinH = h * 0.38;             // middle (windshield + roof)
  const trunkH = h - hoodH - cabinH;   // back slab (far from viewer)

  // ── Ground shadow (soft ellipse with glow)
  ctx.save();
  ctx.globalAlpha = 0.6;
  const shadowG = ctx.createRadialGradient(px, py + 2, 0, px, py + 2, w * 0.75);
  shadowG.addColorStop(0,   'rgba(0, 0, 0, 0.75)');
  shadowG.addColorStop(0.6, 'rgba(0, 0, 0, 0.35)');
  shadowG.addColorStop(1,   'rgba(0, 0, 0, 0)');
  ctx.fillStyle = shadowG;
  ctx.beginPath();
  ctx.ellipse(px, py + 3, w * 0.7, h * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Damage overlay short-circuit
  if (damagedProgress !== undefined) {
    const dmg = blendHex(bodyColor, '#333333', damagedProgress * 0.47);
    ctx.fillStyle = dmg;
    ctx.fillRect(Math.floor(x0), Math.floor(y0), Math.ceil(w), Math.ceil(h));
    if (damagedProgress < 0.9 && Math.random() > 0.4) {
      const fires = ['#FF4400','#FFAA00','#FF0000'];
      ctx.fillStyle = fires[Math.floor(Math.random() * 3)];
      ctx.fillRect(px - 6, y0 - 8, 12, 6 + Math.random() * 6);
    }
    return;
  }

  const bodyHi   = blendHex(bodyColor, '#ffffff', 0.35);
  const bodyLo   = blendHex(bodyColor, '#000000', 0.45);
  const bodyLoB  = blendHex(bodyColor, '#000000', 0.6);
  const roofDark = blendHex(roofColor, '#000000', 0.25);

  // Three horizontal bands simulate a 3/4 top-down box
  // Back slab (trunk for obstacles, hood for player — farther from viewer)
  ctx.fillStyle = isPlayer ? bodyLo : bodyLo;
  ctx.fillRect(Math.floor(x0 + w * 0.08), Math.floor(y0), Math.ceil(w * 0.84), Math.ceil(trunkH));

  // Cabin (roof)
  ctx.fillStyle = roofColor;
  ctx.fillRect(Math.floor(x0 + w * 0.14), Math.floor(y0 + trunkH), Math.ceil(w * 0.72), Math.ceil(cabinH));

  // Front slab (near viewer) — brighter because it catches ground glow
  ctx.fillStyle = bodyColor;
  ctx.fillRect(Math.floor(x0), Math.floor(y0 + trunkH + cabinH), Math.ceil(w), Math.ceil(hoodH));

  // Side rails for volume
  ctx.fillStyle = bodyHi;
  ctx.fillRect(Math.floor(x0), Math.floor(y0 + trunkH + cabinH), Math.max(2, Math.ceil(w * 0.14)), Math.ceil(hoodH));
  ctx.fillStyle = bodyLoB;
  ctx.fillRect(Math.floor(x0 + w - Math.max(2, w * 0.14)), Math.floor(y0 + trunkH + cabinH), Math.max(2, Math.ceil(w * 0.14)), Math.ceil(hoodH));

  // Roof highlight line (thin strip at top of cabin)
  ctx.fillStyle = blendHex(roofColor, '#ffffff', 0.25);
  ctx.fillRect(Math.floor(x0 + w * 0.14), Math.floor(y0 + trunkH), Math.ceil(w * 0.72), Math.max(1, Math.ceil(cabinH * 0.14)));

  // Rear body shadow band (separation between trunk and roof)
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(Math.floor(x0 + w * 0.08), Math.floor(y0 + trunkH - 1), Math.ceil(w * 0.84), Math.max(1, Math.ceil(cabinH * 0.08)));

  // Windshield (light blue trapezoid-ish). Player faces up; obstacle is rear window.
  const wsCol = COL_CAR_WIND;
  if (isPlayer) {
    // Front windshield at bottom of cabin (near viewer)
    const wsY = y0 + trunkH + cabinH * 0.55;
    const wsH = Math.max(3, cabinH * 0.38);
    const grad = ctx.createLinearGradient(0, wsY, 0, wsY + wsH);
    grad.addColorStop(0, '#6aa9d8');
    grad.addColorStop(1, '#c5e5ff');
    ctx.fillStyle = grad;
    ctx.fillRect(Math.floor(x0 + w * 0.18), Math.floor(wsY), Math.ceil(w * 0.64), Math.ceil(wsH));
  } else {
    // Rear window near top of cabin
    const wsY = y0 + trunkH + 1;
    const wsH = Math.max(3, cabinH * 0.42);
    const grad = ctx.createLinearGradient(0, wsY, 0, wsY + wsH);
    grad.addColorStop(0, '#2a3a52');
    grad.addColorStop(1, '#5d8bb8');
    ctx.fillStyle = grad;
    ctx.fillRect(Math.floor(x0 + w * 0.18), Math.floor(wsY), Math.ceil(w * 0.64), Math.ceil(wsH));
  }

  // Side windows (thin vertical strips in the cabin)
  ctx.fillStyle = 'rgba(80, 140, 200, 0.55)';
  ctx.fillRect(Math.floor(x0 + w * 0.13), Math.floor(y0 + trunkH + cabinH * 0.18), Math.max(1, Math.ceil(w * 0.05)), Math.ceil(cabinH * 0.64));
  ctx.fillRect(Math.floor(x0 + w - w * 0.18), Math.floor(y0 + trunkH + cabinH * 0.18), Math.max(1, Math.ceil(w * 0.05)), Math.ceil(cabinH * 0.64));

  // Bumper line at the very bottom (near viewer)
  ctx.fillStyle = bodyLoB;
  ctx.fillRect(Math.floor(x0), Math.floor(y0 + h - Math.max(1, h * 0.04)), Math.ceil(w), Math.max(1, Math.ceil(h * 0.04)));

  // Taillights with bloom (at bottom = toward viewer)
  ctx.save();
  const tlY = y0 + h - Math.max(3, 5 * scale);
  const tlW = Math.max(2, 6 * scale);
  const tlH = Math.max(2, 3.5 * scale);
  ctx.shadowBlur = 14 * Math.max(1, scale);
  ctx.shadowColor = COL_TAILLIGHT;
  ctx.fillStyle = COL_TAILLIGHT;
  ctx.fillRect(Math.floor(x0 + 3),         Math.floor(tlY), tlW, tlH);
  ctx.fillRect(Math.floor(x0 + w - tlW - 3), Math.floor(tlY), tlW, tlH);
  // Bright inner core
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffd0d8';
  ctx.fillRect(Math.floor(x0 + 4),         Math.floor(tlY + 1), Math.max(1, tlW - 2), Math.max(1, tlH - 1));
  ctx.fillRect(Math.floor(x0 + w - tlW - 2), Math.floor(tlY + 1), Math.max(1, tlW - 2), Math.max(1, tlH - 1));
  ctx.restore();

  // Headlights (player only, at top = pointing away)
  if (isPlayer) {
    ctx.save();
    ctx.shadowBlur = 12 * Math.max(1, scale);
    ctx.shadowColor = COL_HEADLIGHT;
    ctx.fillStyle = COL_HEADLIGHT;
    const hlW = Math.max(2, 5 * scale);
    const hlH = Math.max(2, 2.5 * scale);
    ctx.fillRect(Math.floor(x0 + 3),         Math.floor(y0 + 1), hlW, hlH);
    ctx.fillRect(Math.floor(x0 + w - hlW - 3), Math.floor(y0 + 1), hlW, hlH);
    ctx.restore();

    // Headlight cones projecting forward on the road (subtle)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const coneLen = 90 * scale;
    const coneGrad = ctx.createLinearGradient(px, y0, px, y0 - coneLen);
    coneGrad.addColorStop(0, 'rgba(255, 255, 200, 0.25)');
    coneGrad.addColorStop(1, 'rgba(255, 255, 200, 0)');
    ctx.fillStyle = coneGrad;
    ctx.beginPath();
    ctx.moveTo(px - w * 0.35, y0);
    ctx.lineTo(px - w * 0.9,  y0 - coneLen);
    ctx.lineTo(px + w * 0.9,  y0 - coneLen);
    ctx.lineTo(px + w * 0.35, y0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function renderFrame3D() {
  ctx.save();
  if (gs.phase === PHASE_CRASH_ANIM) ctx.translate(shakeX, shakeY);

  drawRoad3D();

  // Sort obstacles by depth (far first) so closer cars overlap farther ones
  const drawList = gs.obs
    .filter(o => o.active && o.y > -L_OBS_H && o.y < L_H + 20)
    .map(o => ({ o, depth: o.y }))
    .sort((a, b) => a.depth - b.depth);

  for (const { o } of drawList) {
    const worldX = L_LANE_CX(o.lane);
    const worldY = o.y + L_OBS_H;  // feet of obstacle
    const p = project3D(worldX, worldY);
    drawCar3D(p.x, p.y, p.scale, OBS_COLORS[o.type % OBS_COLORS.length], '#111111', false);
  }

  // Player
  if (gs.phase === PHASE_CRASH_ANIM) {
    const elapsed = Math.min((nowS - gs.crash_start_s) / CRASH_ANIM_S, 1.0);
    const pp = project3D(gs.car_x + crashPlayerDx / C3_SCALE, L_H);
    drawCar3D(pp.x + crashPlayerDx * 0.3, pp.y + crashPlayerDy * 0.3, pp.scale,
              CAR_COLORS[selectedCarColor].body, CAR_COLORS[selectedCarColor].roof, true, elapsed);

    if (gs.crash_obs_lane >= 0) {
      const op = project3D(L_LANE_CX(gs.crash_obs_lane) + crashObsDx / C3_SCALE, gs.crash_obs_y + L_OBS_H);
      drawCar3D(op.x, op.y, op.scale, '#888888', '#111', false, elapsed);
    }

    // Debris — keep screen-space
    for (const d of debris) {
      if (!d.active) continue;
      fillRect(d.x, d.y, Math.max(1, Math.floor(d.size)), Math.max(1, Math.floor(d.size)), d.color);
    }
  } else if (gs.phase !== PHASE_GAME_OVER) {
    const pp = project3D(gs.car_x, L_H);
    drawCar3D(pp.x, pp.y, pp.scale, CAR_COLORS[selectedCarColor].body, CAR_COLORS[selectedCarColor].roof, true);
  }

  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  if (gs.phase !== PHASE_PLAYING && gs.phase !== PHASE_CRASH_ANIM) return;

  const throttle = getThrottle();

  ctx.save();
  // Subtle text shadow for legibility over the neon road
  ctx.shadowColor = 'rgba(0, 0, 0, 0.65)';
  ctx.shadowBlur = 6;

  // ── Top-left: SCORE / DISTANCE / STATE ───────────────────────────
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold italic 22px "Courier New", monospace';
  ctx.fillText(`SCORE: ${gs.score}`, 22, 36);

  ctx.font = 'bold italic 18px "Courier New", monospace';
  ctx.fillStyle = '#E6E6FA';
  ctx.fillText(`DISTANCE: ${Math.round(gs.distance)} m`, 22, 62);

  // Gear state
  ctx.font = 'bold italic 16px "Courier New", monospace';
  if (throttle > 30) {
    ctx.fillStyle = '#FF5577';
    ctx.shadowColor = 'rgba(255, 85, 119, 0.6)';
    ctx.shadowBlur = 10;
    ctx.fillText('BOOST', 22, 86);
  } else if (throttle < -30) {
    ctx.fillStyle = '#55BBFF';
    ctx.shadowColor = 'rgba(85, 187, 255, 0.6)';
    ctx.shadowBlur = 10;
    ctx.fillText('BRAKE', 22, 86);
  } else {
    ctx.fillStyle = '#6EFF9C';
    ctx.shadowColor = 'rgba(110, 255, 156, 0.55)';
    ctx.shadowBlur = 10;
    ctx.fillText('CRUISE', 22, 86);
  }

  // ── Top-right: BEST + SPEED ──────────────────────────────────────
  ctx.shadowColor = 'rgba(0, 0, 0, 0.65)';
  ctx.shadowBlur = 6;
  ctx.textAlign = 'right';

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold italic 22px "Courier New", monospace';
  const bestText = `BEST: ${gs.high_score}`;
  ctx.fillText(bestText, SCR_W - 48, 36);

  // Trophy icon after "BEST:" value
  const bestW = ctx.measureText(bestText).width;
  drawTrophy(SCR_W - 40, 22, 18, '#FFD23F');

  ctx.fillStyle = '#7FD4FF';
  ctx.font = 'bold italic 20px "Courier New", monospace';
  ctx.fillText(`SPEED: ${Math.round(gs.speed)} KM/H`, SCR_W - 22, 64);

  // ── Bottom-right: control legend ─────────────────────────────────
  ctx.fillStyle = 'rgba(235, 235, 255, 0.75)';
  ctx.font = 'bold italic 15px "Courier New", monospace';
  const bx = SCR_W - 22;
  let by = SCR_H - 74;
  ctx.fillText('← →   STEER', bx, by); by += 22;
  ctx.fillText('↑   BOOST',    bx, by); by += 22;
  ctx.fillText('↓   BRAKE',    bx, by);

  ctx.restore();
}

// Simple trophy icon (vector shapes, not emoji) so it matches the pixel feel.
function drawTrophy(x, y, size, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = 'rgba(255, 210, 63, 0.6)';
  ctx.shadowBlur = 10;
  const w = size, h = size;
  // Cup body
  ctx.fillRect(x + w * 0.22, y + h * 0.10, w * 0.56, h * 0.45);
  // Handles
  ctx.fillRect(x + w * 0.06, y + h * 0.20, w * 0.12, h * 0.22);
  ctx.fillRect(x + w * 0.82, y + h * 0.20, w * 0.12, h * 0.22);
  // Stem
  ctx.fillRect(x + w * 0.40, y + h * 0.55, w * 0.20, h * 0.18);
  // Base
  ctx.fillRect(x + w * 0.22, y + h * 0.78, w * 0.56, h * 0.14);
  ctx.restore();
}

// ─── Menu overlay ─────────────────────────────────────────────────────────────
function drawPanel(cx, cy, w, h) {
  const x = cx - w / 2, y = cy - h / 2;
  ctx.save();
  // Glow
  ctx.shadowColor = 'rgba(236, 72, 153, 0.5)';
  ctx.shadowBlur = 40;
  ctx.fillStyle = 'rgba(10, 5, 25, 0.88)';
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 16);
  ctx.fill();
  ctx.restore();

  // Neon border
  ctx.save();
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, '#8b5cf6');
  grad.addColorStop(1, '#ec4899');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 16);
  ctx.stroke();
  ctx.restore();
}

  NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_A4,NOTE_G4,
  NOTE_C5,NOTE_A4,NOTE_G4,NOTE_A4,NOTE_C5,NOTE_AS4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_G4,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_A4,NOTE_G4,
  NOTE_C5,NOTE_C5,NOTE_AS4,NOTE_C5,NOTE_AS4,NOTE_A4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,NOTE_C4,
  NOTE_REST,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_E4,NOTE_D4,NOTE_C4,NOTE_D4,
  NOTE_REST,NOTE_A4,NOTE_G4,NOTE_F4,NOTE_E4,NOTE_D4,NOTE_C4,NOTE_D4,
];

const MELODY_DURS = [
  4,4,8,4,8,4,4,8,4,8,4,8,4,8,4,1,
  4,4,8,4,8,4,4,8,4,8,4,8,4,8,4,2,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  8,16,8,16,8,16,8,16,8,16,8,16,8,16,8,16,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  1,4,8,8,2,4,8,4,8,4,1,
  4,8,8,8,8,8,8,1,
  4,8,8,8,8,8,8,1,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  4,4,8,4,8,4,4,8,4,8,4,4,4,4,1,
  1,4,8,8,2,4,8,4,8,4,1,
  4,8,8,8,8,8,8,1,
  4,8,8,8,8,8,8,1,
];

let audioCtx    = null;
let melodyTimer = null;
let melodyOsc   = null;
let melodyIdx   = 0;
let melodyOn    = false;

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startMelody() {
  if (melodyOn) return;
  melodyOn  = true;
  melodyIdx = 0;
  playNextNote();
}

function stopMelody() {
  melodyOn = false;
  if (melodyTimer) { clearTimeout(melodyTimer); melodyTimer = null; }
  if (melodyOsc)   { try { melodyOsc.stop(); } catch(e){} melodyOsc = null; }
}

function playNextNote() {
  if (!melodyOn) return;
  const ac    = getAC();
  const freq  = MELODY_NOTES[melodyIdx % MELODY_NOTES.length];
  const dur   = MELODY_DURS[melodyIdx  % MELODY_DURS.length];
  const noteMs = 1000 / dur;
  const slotMs = noteMs * 1.3;

  if (melodyOsc) { try { melodyOsc.stop(); } catch(e){} melodyOsc = null; }

  if (freq > 0) {
    melodyOsc = ac.createOscillator();
    const gain = ac.createGain();
    melodyOsc.type = 'square';
    melodyOsc.frequency.value = freq;
    gain.gain.value = 0.04;
    melodyOsc.connect(gain);
    gain.connect(ac.destination);
    melodyOsc.start();
    // Release tone before slot ends (same as C3 firmware)
    setTimeout(() => { if (melodyOsc) { try { melodyOsc.stop(); } catch(e){} melodyOsc = null; } }, noteMs);
  }

  melodyTimer = setTimeout(() => {
    melodyIdx = (melodyIdx + 1) % MELODY_NOTES.length;
    playNextNote();
  }, slotMs);
}

// ─── Main game loop ───────────────────────────────────────────────────────────
let lastTime          = 0;
let prevStart         = false;
let menuColorDebounce = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  nowS     = timestamp / 1000;

  // ── Input ──
  const steer    = getSteer();
  const throttle = getThrottle();
  const start    = keys['Space'] || keys['Enter'];
  const startEdge = start && !prevStart;
  prevStart = start;

  // Phase transitions
  if (startEdge) {
    if (gs.phase === PHASE_MENU || gs.phase === PHASE_GAME_OVER) {
      resetGame();
      gs.phase = PHASE_PLAYING;
      startMelody();
    }
  }
  if (keys['KeyM'] && gs.phase === PHASE_GAME_OVER) {
    gs.phase = PHASE_MENU;
    stopMelody();
  }

  // Menu: cycle car color (arrow keys / A-D, with debounce)
  if (gs.phase === PHASE_MENU && nowS - menuColorDebounce > 0.28) {
    if (keys['ArrowLeft'] || keys['KeyA']) {
      selectedCarColor = (selectedCarColor + CAR_COLORS.length - 1) % CAR_COLORS.length;
      menuColorDebounce = nowS;
    } else if (keys['ArrowRight'] || keys['KeyD']) {
      selectedCarColor = (selectedCarColor + 1) % CAR_COLORS.length;
      menuColorDebounce = nowS;
    }
  }

  // ── Crash visual update (S3 game_loop_cb port) ──
  if (gs.phase === PHASE_CRASH_ANIM) {
    const elapsed  = Math.min((nowS - gs.crash_start_s) / CRASH_ANIM_S, 1.0);
    const push     = gs.crash_speed * 0.5;
    crashPlayerDy += push * 0.3  * dt;
    crashPlayerDx += push * 0.1  * dt;
    crashObsDy    -= push * 0.4  * dt;
    crashObsDx    -= push * 0.05 * dt;
    const shakeAmt = Math.min((1.0 - elapsed) * (gs.crash_speed / 40.0), 8.0);
    shakeX = (Math.random() * 2 - 1) * shakeAmt;
    shakeY = (Math.random() * 2 - 1) * shakeAmt;
    updateDebris(dt);
  }

  // ── Physics (C3 port) ──
  updatePhysics(dt, steer, throttle);

  // ── Toggle 3D mode (key "3") ──
  if (keys['Digit3'] && !prev3Key) { render3D = !render3D; }
  prev3Key = !!keys['Digit3'];

  // ── Render ──
  if (render3D) renderFrame3D(); else renderFrame();
  drawHUD();
  drawModeToggle();
  if (gs.phase === PHASE_MENU)      drawMenu();
  if (gs.phase === PHASE_GAME_OVER) drawGameOver();

  requestAnimationFrame(gameLoop);
}

let prev3Key = false;

// Small clickable 2D/3D toggle in the bottom-left of the canvas.
const MODE_BTN = { x: 18, y: 0, w: 92, h: 32 };
function drawModeToggle() {
  MODE_BTN.y = SCR_H - MODE_BTN.h - 14;
  const { x, y, w, h } = MODE_BTN;
  ctx.save();
  ctx.shadowColor = render3D ? 'rgba(236, 72, 153, 0.55)' : 'rgba(139, 92, 246, 0.55)';
  ctx.shadowBlur = 14;
  ctx.fillStyle = 'rgba(10, 5, 25, 0.72)';
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.fill();

  ctx.shadowBlur = 0;
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, '#8b5cf6');
  grad.addColorStop(1, '#ec4899');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.stroke();

  // "2D | 3D" pill with active side highlighted
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold italic 14px "Courier New", monospace';

  ctx.fillStyle = !render3D ? '#FFFFFF' : 'rgba(200,200,230,0.5)';
  ctx.fillText('2D', x + w * 0.28, y + h / 2);

  ctx.fillStyle = 'rgba(200,200,230,0.4)';
  ctx.fillText('|', x + w / 2, y + h / 2);

  ctx.fillStyle = render3D ? '#FFFFFF' : 'rgba(200,200,230,0.5)';
  ctx.fillText('3D', x + w * 0.72, y + h / 2);

  // Tiny "[3]" key hint
  ctx.font = 'italic 10px "Courier New", monospace';
  ctx.fillStyle = 'rgba(200,200,230,0.5)';
  ctx.fillText('PRESS 3', x + w / 2, y + h + 10);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

// Click handler for the mode toggle (maps canvas CSS → internal coords).
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = ((e.clientX - rect.left) / rect.width)  * SCR_W;
  const cy = ((e.clientY - rect.top)  / rect.height) * SCR_H;
  if (cx >= MODE_BTN.x && cx <= MODE_BTN.x + MODE_BTN.w &&
      cy >= MODE_BTN.y && cy <= MODE_BTN.y + MODE_BTN.h) {
    render3D = !render3D;
  }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
gs = { phase: PHASE_MENU, high_score: 0 };
resetGame();
gs.phase = PHASE_MENU;

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });
</script>
