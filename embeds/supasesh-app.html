<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupaSesh | Pomodoro & Tasks</title>
    <style>
        :root {
            --bg: #0e0b1e;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-raised: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.04);
            --text: #f5f3ff;
            --muted: #a098c4;
            --violet: #8b5cf6;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --red: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, sans-serif;
            background:
                radial-gradient(ellipse at top right, rgba(139, 92, 246, 0.15), transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(236, 72, 153, 0.12), transparent 50%),
                linear-gradient(180deg, #0c0922 0%, var(--bg) 100%);
            color: var(--text);
        }

        body { padding: 14px; }

        /* ── Layout ── */
        .app {
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: minmax(280px, 1.2fr) minmax(320px, 1.8fr);
            gap: 16px;
            min-height: 0;
        }

        .panel {
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Pomodoro Sidebar ── */
        .pomodoro-panel {
            padding: 24px;
            align-items: center;
            justify-content: center;
            gap: 32px;
            text-align: center;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--violet), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .brand p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Timer Circle */
        .timer-circle {
            position: relative;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--surface) 0%, transparent 100%);
            border: 4px solid var(--surface-raised);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.1) inset, 0 10px 30px rgba(0,0,0,0.2);
        }

        .timer-progress {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 4px solid var(--violet);
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 50% 0%);
            transition: stroke-dashoffset 0.5s linear;
        }

        .time-display {
            font-size: 4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .mode-label {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 8px;
        }

        .controls {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            border: 0;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--violet), var(--pink));
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        .btn-primary:active { transform: translateY(2px); }

        .btn-secondary {
            background: var(--surface-raised);
            border: 1px solid var(--border-light);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        .btn-secondary:active { transform: translateY(2px); }

        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .stat { text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: 700; }
        .stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

        /* ── Tasks Panel ── */
        .tasks-panel {
            padding: 24px;
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .tasks-header h2 {
            font-size: 1.35rem;
            font-weight: 600;
        }

        .task-input-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .task-input {
            flex: 1;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .task-input:focus { border-color: var(--violet); }
        .task-input::placeholder { color: rgba(160, 152, 196, 0.5); }

        .add-task-btn {
            background: var(--surface-raised);
            color: var(--text);
            border: 1px solid var(--border);
            width: 44px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .add-task-btn:hover { background: rgba(255,255,255,0.12); }

        .tasks-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }

        .tasks-list::-webkit-scrollbar { width: 6px; }
        .tasks-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

        .task-item {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .task-item:hover { background: var(--surface-raised); }

        .checkbox {
            width: 22px; height: 22px;
            border-radius: 6px;
            border: 2px solid var(--muted);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.2s;
        }

        .task-item.completed .checkbox {
            background: var(--violet);
            border-color: var(--violet);
        }
        
        .task-item.completed .checkbox::after {
            content: "✓";
            color: white;
            font-size: 14px;
        }

        .task-content {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text);
            transition: color 0.2s;
        }

        .task-item.completed .task-content {
            color: var(--muted);
            text-decoration: line-through;
        }

        .delete-btn {
            opacity: 0;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            transition: color 0.2s, opacity 0.2s;
        }
        .task-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--red); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                overflow-y: auto;
                min-height: auto;
            }
            .panel { overflow: visible; }
            .pomodoro-panel { padding: 20px; gap: 24px; }
            .timer-circle { width: 180px; height: 180px; }
            .time-display { font-size: 3.2rem; }
            .tasks-panel { padding: 20px; flex: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="panel pomodoro-panel">
            <div class="brand">
                <h1>SupaSesh</h1>
                <p>Focus Timer</p>
            </div>

            <div class="timer-circle">
                <!-- Inner progress visualization purely CSS-based but we manipulate class or inline rotation -->
                <svg class="timer-progress" viewBox="0 0 100 100" style="position:absolute; inset:0; width:100%; height:100%; transform: rotate(-90deg);">
                    <circle id="progress-ring" cx="50" cy="50" r="46" fill="transparent" stroke="var(--violet)" stroke-width="4" stroke-dasharray="289.02" stroke-dashoffset="0" stroke-linecap="round"></circle>
                </svg>
                <div class="time-display" id="time-display">25:00</div>
                <div class="mode-label" id="mode-label">Work</div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-mode">Switch to Break</button>
                <button class="btn btn-primary" id="btn-toggle">Start</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="stat-sessions">0</div>
                    <div class="stat-lbl">Sessions</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="stat-hours">0.0</div>
                    <div class="stat-lbl">Focus Hrs</div>
                </div>
            </div>
        </aside>

        <section class="panel tasks-panel">
            <div class="tasks-header">
                <h2>Today's Tasks</h2>
            </div>
            
            <form class="task-input-wrap" id="task-form">
                <input type="text" id="task-input" class="task-input" placeholder="What will you focus on?" autocomplete="off">
                <button type="submit" class="add-task-btn">+</button>
            </form>

            <div class="tasks-list" id="tasks-list">
                <!-- Initial Tasks -->
            </div>
        </section>
    </div>

    <script>
        // ─── Pomodoro Logic ───
        const WORK_TIME = 25 * 60;
        const BREAK_TIME = 5 * 60;
        
        let timeLeft = WORK_TIME;
        let isRunning = false;
        let isWork = true;
        let timerId = null;
        
        let totalSessions = 0;
        let totalFocusSeconds = 0;

        const timeDisplay = document.getElementById("time-display");
        const modeLabel = document.getElementById("mode-label");
        const btnToggle = document.getElementById("btn-toggle");
        const btnMode = document.getElementById("btn-mode");
        const progressRing = document.getElementById("progress-ring");
        const circumference = 2 * Math.PI * 46; // r=46

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timeDisplay.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            const total = isWork ? WORK_TIME : BREAK_TIME;
            const pct = timeLeft / total;
            progressRing.style.strokeDashoffset = circumference - (pct * circumference);
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                btnToggle.textContent = "Start";
                btnToggle.style.background = "linear-gradient(135deg, var(--violet), var(--pink))";
            } else {
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        if (isWork) totalFocusSeconds++;
                        updateDisplay();
                    } else {
                        // Timer Complete
                        clearInterval(timerId);
                        if (isWork) totalSessions++;
                        switchMode();
                        updateStats();
                        btnToggle.textContent = "Start";
                    }
                }, 1000);
                btnToggle.textContent = "Pause";
                btnToggle.style.background = "linear-gradient(135deg, var(--muted), #555)";
            }
            isRunning = !isRunning;
        }

        function switchMode() {
            if (isRunning) toggleTimer();
            isWork = !isWork;
            timeLeft = isWork ? WORK_TIME : BREAK_TIME;
            modeLabel.textContent = isWork ? "Work" : "Break";
            btnMode.textContent = isWork ? "Switch to Break" : "Switch to Work";
            progressRing.style.stroke = isWork ? "var(--violet)" : "var(--cyan)";
            updateDisplay();
        }

        function updateStats() {
            document.getElementById("stat-sessions").textContent = totalSessions;
            document.getElementById("stat-hours").textContent = (totalFocusSeconds / 3600).toFixed(1);
        }

        btnToggle.addEventListener("click", toggleTimer);
        btnMode.addEventListener("click", switchMode);
        updateDisplay();


        // ─── Tasks Logic ───
        const taskForm = document.getElementById("task-form");
        const taskInput = document.getElementById("task-input");
        const tasksList = document.getElementById("tasks-list");

        let tasks = [
            { id: 1, text: "Finish portfolio spacing", completed: true },
            { id: 2, text: "Redesign SupaSesh layout", completed: false },
            { id: 3, text: "Deploy to AWS Amplify", completed: false }
        ];

        function renderTasks() {
            tasksList.innerHTML = "";
            tasks.forEach(task => {
                const item = document.createElement("div");
                item.className = `task-item ${task.completed ? "completed" : ""}`;
                item.innerHTML = `
                    <div class="checkbox"></div>
                    <div class="task-content">${task.text}</div>
                    <button class="delete-btn">×</button>
                `;
                
                item.querySelector(".checkbox").addEventListener("click", () => toggleTask(task.id));
                item.querySelector(".delete-btn").addEventListener("click", () => deleteTask(task.id));
                
                tasksList.appendChild(item);
            });
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            task.completed = !task.completed;
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
        }

        taskForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({ id: Date.now(), text, completed: false });
                taskInput.value = "";
                renderTasks();
            }
        });

        renderTasks();
    </script>
</body>
</html>
